  <text x="640" y="360" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#667580" text-anchor="middle">二进制+源码双模</text>
  <rect x="850" y="130" width="370" height="320" rx="14" fill="#FFFFFF" fill-opacity="0.92" stroke="#E0E0E0" stroke-width="0.5"/>
