<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#6096E6"/>
  <rect x="60" y="30" width="120" height="32" rx="14" fill="#6096E6" fill-opacity="0.1"/>
  <text x="120" y="52" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#6096E6" font-weight="bold" text-anchor="middle">案例二</text>
  <text x="200" y="54" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#2D2D2D">网络安防场景 — 某安防设备厂商</text>
  <line x1="80" y1="78" x2="1200" y2="78" stroke="#E0E0E0" stroke-width="0.5"/>
  <rect x="60" y="105" width="1160" height="200" rx="14" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="100" y="145" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#6096E6">场景描述</text>
  <text x="100" y="180" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2D2D">某安防设备厂商为某市公安提供500台IP摄像头+交换机。采购方要求：</text>
  <text x="100" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2D2D">设备入网前须通过安全检测，固件不可含已知漏洞，且须提供第三方安全测试报告。</text>
  <rect x="60" y="325" width="560" height="40" rx="10" fill="#FFC000" fill-opacity="0.15"/>
  <text x="90" y="352" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFC000">问：面对500台设备的交付验收需求，如何设计检测方案？</text>
  <text x="90" y="400" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#667580">（请培训学员思考并讨论 2 分钟）</text>
  <rect x="60" y="430" width="1160" height="170" rx="14" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="100" y="470" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#6096E6">答案与推演</text>
  <text x="100" y="505" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">1. 固件批量检测 → BAT（固兮）自动化批量解包+漏洞扫描</text>
  <text x="100" y="530" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">2. 协议栈安全性 → FUZZ（侦兮）TCP/IP+RTSP协议模糊测试</text>
  <text x="100" y="555" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">3. 第三方检测报告 → BAT-SER+FUZZ-SER+PENTEST 组合出报告</text>
  <text x="100" y="580" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">4. 持续跟踪 → GuardFox（洞兮）新CVE爆发时快速复扫，维护采购方信任</text>
  <line x1="60" y1="640" x2="1200" y2="640" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="60" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580">软安科技 · IT制造培训</text>
  <text x="1200" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580" text-anchor="end">10 / 14</text>
</svg>