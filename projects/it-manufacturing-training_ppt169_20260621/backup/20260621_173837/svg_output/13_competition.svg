<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#20A675"/>
  <text x="80" y="52" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#2D2D2D">竞品对比与差异化优势</text>
  <line x1="80" y1="72" x2="1200" y2="72" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Header -->
  <rect x="60" y="100" width="200" height="40" rx="8" fill="#20A675"/>
  <text x="160" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">产品</text>
  <rect x="268" y="100" width="340" height="40" rx="8" fill="#F5F7FA"/>
  <text x="438" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">软安优势</text>
  <rect x="616" y="100" width="340" height="40" rx="8" fill="#F5F7FA"/>
  <text x="786" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">竞品短板</text>
  <rect x="964" y="100" width="256" height="40" rx="8" fill="#F5F7FA"/>
  <text x="1092" y="127" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">话术</text>
  <!-- Row 1: SAST -->
  <rect x="60" y="148" width="200" height="75" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="160" y="192" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">SAST 静兮</text>
  <rect x="268" y="148" width="340" height="75" rx="8" fill="#20A675" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="438" y="185" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">编译型检测·C/C++误报&lt;10%·跨文件跨函数</text>
  <text x="438" y="208" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">MISRA/CERT/GJB三标准·AI智能修复</text>
  <rect x="616" y="148" width="340" height="75" rx="8" fill="#6096E6" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="786" y="192" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">多数竞品为模式匹配·误报率30%+·单文件检测</text>
  <rect x="964" y="148" width="256" height="75" rx="8" fill="#FFC000" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="1092" y="192" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#FFC000" text-anchor="middle">"我们是编译型检测不是搜索匹配"</text>
  <!-- Row 2: SCA -->
  <rect x="60" y="230" width="200" height="75" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="160" y="274" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">SCA 源兮</text>
  <rect x="268" y="230" width="340" height="75" rx="8" fill="#20A675" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="438" y="267" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">100T+知识库·Java 0%误报·AI大模型/MCP/Skill覆盖</text>
  <text x="438" y="290" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">二进制+源码双模·MCP/API全量开放</text>
  <rect x="616" y="230" width="340" height="75" rx="8" fill="#6096E6" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="786" y="274" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">竞品不支持AI组件·知识库规模不足·无二进制模式</text>
  <rect x="964" y="230" width="256" height="75" rx="8" fill="#FFC000" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="1092" y="274" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#FFC000" text-anchor="middle">"我们是唯一覆盖AI组件的SCA"</text>
  <!-- Row 3: BAT -->
  <rect x="60" y="312" width="200" height="75" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="160" y="356" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">BAT 固兮</text>
  <rect x="268" y="312" width="340" height="75" rx="8" fill="#20A675" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="438" y="349" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">100+格式·不依赖源码·通信安全+IAC+敏感数据</text>
  <text x="438" y="372" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">固件解包+成分+加密算法三合一</text>
  <rect x="616" y="312" width="340" height="75" rx="8" fill="#6096E6" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="786" y="356" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">传统工具仅做固件解包·无成分分析·格式覆盖有限</text>
  <rect x="964" y="312" width="256" height="75" rx="8" fill="#FFC000" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="1092" y="356" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#FFC000" text-anchor="middle">"我们是固件安全的瑞士军刀"</text>
  <!-- Row 4: FUZZ -->
  <rect x="60" y="394" width="200" height="75" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="160" y="438" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">FUZZ 侦兮</text>
  <rect x="268" y="394" width="340" height="75" rx="8" fill="#20A675" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="438" y="431" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">50+协议·国外顶级团队·汽车+工控全覆盖</text>
  <text x="438" y="454" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">不只是网络协议·Can/汽车以太网独家支持</text>
  <rect x="616" y="394" width="340" height="75" rx="8" fill="#6096E6" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="786" y="438" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#667580" text-anchor="middle">多数开源Fuzz工具需大量定制·协议支持有限</text>
  <rect x="964" y="394" width="256" height="75" rx="8" fill="#FFC000" fill-opacity="0.05" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="1092" y="438" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#FFC000" text-anchor="middle">"50+协议开箱即用不需要自己写"</text>
  <!-- Bottom takeaway -->
  <rect x="60" y="500" width="1160" height="100" rx="14" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="100" y="540" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#20A675">差异化总结</text>
  <text x="100" y="572" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">"我们的核心差异化：AI组件全覆盖 + 编译型检测非正则匹配 + 二进制/源码双模 + 顶级Fuzz引擎 + 大模型驱动的代码审计"</text>
  <line x1="60" y1="640" x2="1200" y2="640" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="60" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580">软安科技 · IT制造培训</text>
  <text x="1200" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580" text-anchor="end">13 / 14</text>
