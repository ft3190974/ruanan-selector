<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#20A675"/>
  <rect x="60" y="30" width="120" height="32" rx="14" fill="#20A675" fill-opacity="0.1"/>
  <text x="120" y="52" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#20A675" font-weight="bold" text-anchor="middle">案例一</text>
  <text x="200" y="54" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#2D2D2D">消费电子场景 — 某智能手表品牌</text>
  <line x1="80" y1="78" x2="1200" y2="78" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Scenario box -->
  <rect x="60" y="105" width="1160" height="200" rx="14" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="100" y="145" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#20A675">场景描述</text>
  <text x="100" y="180" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2D2D">某智能手表品牌即将发布新品，其固件中有30+开源组件，产品支持蓝牙5.3/WiFi6/NFC，</text>
  <text x="100" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2D2D">供应链管理方要求提供SBOM清单，且近期Watch OS曝出高危CVE漏洞。</text>
  <!-- Q&A Section -->
  <rect x="60" y="325" width="560" height="40" rx="10" fill="#FFC000" fill-opacity="0.15"/>
  <text x="90" y="352" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFC000">问：该客户的核心安全需求有哪些？推荐哪些产品组合？</text>
  <text x="90" y="400" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#667580">（请培训学员思考并讨论 2 分钟，然后翻页看答案）</text>
  <!-- Answer (revealed) -->
  <rect x="60" y="430" width="1160" height="170" rx="14" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="100" y="470" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#20A675">答案与推演</text>
  <text x="100" y="505" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">1. 固件成分分析 → BAT（固兮）解包+识别30+开源组件</text>
  <text x="100" y="530" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">2. SBOM生成+许可证合规 → SCA（源兮）自动生成SBOM清单，满足供应链方要求</text>
  <text x="100" y="555" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">3. 蓝牙/WiFi/NFC协议安全 → FUZZ（侦兮）协议模糊测试</text>
  <text x="100" y="580" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2D2D">4. Watch OS漏洞验证 → GuardFox（洞兮）CVE验证+POC，快速评估影响</text>
  <line x1="60" y1="640" x2="1200" y2="640" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="60" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580">软安科技 · IT制造培训</text>
  <text x="1200" y="680" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580" text-anchor="end">09 / 14</text>
</svg>