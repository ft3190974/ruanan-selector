  <text x="885" y="350" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">代表产品</text>
  <text x="885" y="378" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#667580">服务机器人 / 工业机器人</text>
  <text x="885" y="400" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#667580">无人系统 / 智能传感器</text>
  <line x1="885" y1="422" x2="1210" y2="422" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="885" y="450" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">核心安全诉求</text>
  <text x="885" y="478" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#667580">AI模型+固件双重安全</text>
