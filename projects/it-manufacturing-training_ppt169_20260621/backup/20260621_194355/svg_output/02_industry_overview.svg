  <text x="950" y="574" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFC000" text-anchor="middle" font-weight="bold">推：SCA+SAST+BAT</text>
  <line x1="40" y1="650" x2="1240" y2="650" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="40" y="690" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580">软安科技 · IT制造培训</text>
  <text x="1240" y="690" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#667580" text-anchor="end">02 / 14</text>
