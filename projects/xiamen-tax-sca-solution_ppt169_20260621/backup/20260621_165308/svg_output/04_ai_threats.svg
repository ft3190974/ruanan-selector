  <path d="M17 8l4 4l-4 4" />
  <path d="M14 4l-4 16" /></g>
    </g>
    <text x="56" y="46" font-family="SimHei, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#2D2D2D">AI框架深度分析</text>
    <text x="56" y="70" font-family="SimSun, 'Times New Roman', serif" font-size="15" fill="#445469">PyTorch/TensorFlow/JAX等框架及模型权重文件成分解析</text>
