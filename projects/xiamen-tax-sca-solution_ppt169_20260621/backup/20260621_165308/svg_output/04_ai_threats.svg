<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <line x1="60" y1="0" x2="60" y2="60" stroke="#20A675" stroke-width="3"/>
  <text x="80" y="42" font-family="SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold" fill="#2D2D2D">核心能力一：覆盖AI时代的全量开源风险</text>
  <text x="80" y="72" font-family="SimSun, 'Times New Roman', serif" font-size="18" fill="#445469">业界首个将开源大模型、MCP工具链、Skill插件纳入成分分析的SCA平台</text>
  <line x1="80" y1="88" x2="1200" y2="88" stroke="#E0E0E0" stroke-width="0.5"/>
