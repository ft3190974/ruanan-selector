    <line x1="-80" y1="-54" x2="-28" y2="-18" stroke="#E0E0E0" stroke-width="0.8"/>
    <circle cx="95" cy="-50" r="12" fill="#FFFFFF" stroke="#20A675" stroke-width="1.5"/>
    <text x="95" y="-46" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#20A675" text-anchor="middle">Skill</text>
    <line x1="85" y1="-44" x2="27" y2="-14" stroke="#E0E0E0" stroke-width="0.8"/>
