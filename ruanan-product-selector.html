<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>软安科技 | 用户自主选型助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif}
body{background:linear-gradient(135deg,#f0f4f8 0%,#e8edf2 100%);min-height:100vh}
:root{
  --blue:#1D4699;--blue-light:#E8EEF8;--blue-dark:#15357a;
  --red:#C00000;--red-light:#FEF2F2;
  --green:#00B050;--green-dark:#20A675;--green-light:#D3F4E6;
  --teal:#007983;--purple:#A850B6;
  --text:#7E7E7E;--text-dark:#505050;--text-darker:#252525;
  --bg:#FFFFFF;--bg-card:#F8FAFC;--border:#E2E8F0;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-lg:0 10px 40px rgba(0,0,0,0.1);
  --radius:14px;
}

/* Topbar */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;color:var(--blue);text-decoration:none}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1D4699,#00B050);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px}
.btn{padding:8px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#1D4699,#15357a);color:#fff;box-shadow:0 2px 8px rgba(29,70,153,0.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(29,70,153,0.35)}
.btn-outline{background:#fff;color:var(--text-dark);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg-card)}
.btn-green{background:linear-gradient(135deg,#00B050,#20A675);color:#fff;box-shadow:0 2px 8px rgba(0,176,80,0.25)}
.btn-red{background:var(--red);color:#fff}
.btn-lg{padding:12px 32px;font-size:16px;border-radius:12px}
.btn-sm{padding:5px 14px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}

/* Layout */
.container{max-width:960px;margin:0 auto;padding:28px 20px}

/* Steps bar */
.steps-bar{display:flex;align-items:center;justify-content:center;margin-bottom:32px;gap:0}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);font-weight:500;white-space:nowrap}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--border);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:all 0.3s}
.step-num.active{background:var(--blue);box-shadow:0 0 0 4px var(--blue-light)}
.step-num.done{background:var(--green);box-shadow:none}
.step-arrow{color:var(--border);margin:0 8px;font-size:16px;transition:all 0.3s}
.step-arrow.done{color:var(--green)}

/* Card */
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp 0.35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:22px;font-weight:800;color:var(--text-darker);margin-bottom:4px}
.sec-sub{font-size:14px;color:var(--text);margin-bottom:24px;line-height:1.6}
.sec-label{font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}

/* Industry grid */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ind-card{border:2px solid var(--border);border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:center;transition:all 0.25s;background:#fff}
.ind-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(29,70,153,0.1);transform:translateY(-2px)}
.ind-card.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 4px rgba(29,70,153,0.08)}
.ind-icon{font-size:34px;margin-bottom:6px}
.ind-name{font-weight:700;font-size:14px;color:var(--text-darker)}
.ind-reg{font-size:11px;color:var(--text);margin-top:4px;line-height:1.3}

/* Scenario tags */
.scene-group{margin-bottom:20px}
.scene-group-title{font-size:15px;font-weight:700;color:var(--text-darker);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.scene-group-title .icon{font-size:20px}
.scene-tags{display:flex;flex-wrap:wrap;gap:8px}
.scene-tag{border:2px solid var(--border);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-dark);transition:all 0.2s;background:#fff;display:flex;align-items:center;gap:6px}
.scene-tag:hover{border-color:var(--green);background:#f8fdf9}
.scene-tag.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.scene-tag .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.2s}
.scene-tag.selected .dot{background:var(--green)}
.scene-tag .desc{font-size:11px;color:var(--text);font-weight:400;margin-top:2px}
.scene-tag .price-tag{font-size:11px;color:var(--blue);font-weight:700;margin-top:2px}

/* Budget range */
.budget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.budget-card{border:2px solid var(--border);border-radius:var(--radius);padding:20px 14px;cursor:pointer;text-align:center;transition:all 0.25s;background:#fff}
.budget-card:hover{border-color:var(--blue)}
.budget-card.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 4px rgba(29,70,153,0.08)}
.budget-range{font-size:20px;font-weight:800;color:var(--blue);margin-bottom:4px}
.budget-label{font-size:12px;color:var(--text)}
.budget-desc{font-size:11px;color:var(--text);margin-top:6px}

/* Pain points */
.pain-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.pain-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.25s;background:#fff;text-align:left}
.pain-card:hover{border-color:var(--red)}
.pain-card.selected{border-color:var(--red);background:var(--red-light)}
.pain-card .pain-icon{font-size:24px;margin-bottom:6px}
.pain-card .pain-title{font-weight:600;font-size:14px;color:var(--text-darker);margin-bottom:4px}
.pain-card .pain-desc{font-size:12px;color:var(--text);line-height:1.5}

/* Inline tags for multi-select */
.inline-tags{display:flex;flex-wrap:wrap;gap:6px}.inline-tag{border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;transition:.2s;background:#fff}.inline-tag:hover{border-color:var(--blue)}.inline-tag.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:600}

/* Result */
.result-header{text-align:center;padding:16px 0 24px}
.result-title{font-size:24px;font-weight:800;color:var(--text-darker)}
.result-sub{font-size:14px;color:var(--text);margin-top:4px}
.rec-product{border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:12px;background:var(--bg-card)}
.rec-product .rec-name{font-weight:700;font-size:17px;color:var(--text-darker);margin-bottom:4px}
.rec-product .rec-brand{font-size:13px;color:var(--blue);font-weight:600;margin-bottom:8px}
.rec-product .rec-features{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.rec-feature{font-size:11px;padding:3px 10px;background:var(--green-light);color:var(--green-dark);border-radius:6px;font-weight:500}
.rec-product .rec-scene{font-size:12px;color:var(--teal);margin-top:8px}
.rec-price-box{text-align:right;flex-shrink:0}
.rec-price{font-size:22px;font-weight:900;color:var(--blue)}
.rec-price-label{font-size:12px;color:var(--text)}

/* Quote summary */
.quote-card{background:linear-gradient(135deg,#1D4699,#1a3f8a);color:#fff;border-radius:16px;padding:28px 32px;margin-bottom:20px}
.quote-card .total{font-size:44px;font-weight:900;line-height:1;margin:8px 0}
.quote-card .total-label{font-size:14px;opacity:0.8}
.quote-note{background:var(--bg-card);border-radius:12px;padding:16px 20px;font-size:13px;color:var(--text-dark);line-height:1.8}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-darker);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;transition:all 0.2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,70,153,0.08)}
.form-group textarea{resize:vertical;min-height:80px}

/* Toast */
.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;color:#fff;font-weight:500;font-size:14px;z-index:999;animation:slideIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* progress */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;transition:all 0.3s}
.progress-fill{height:100%;background:linear-gradient(90deg,#1D4699,#00B050);border-radius:2px;transition:all 0.4s ease}

@media(max-width:768px){
  .grid3,.grid4{grid-template-columns:repeat(2,1fr)}
  .grid2,.form-row{grid-template-columns:1fr}
  .budget-grid{grid-template-columns:repeat(2,1fr)}
  .pain-cards{grid-template-columns:1fr}
  .card{padding:20px}
  .steps-bar{flex-wrap:wrap;gap:4px}
  .step-arrow{display:none}
}
</style>
</head>
<body>

<!-- ═══ LOGIN OVERLAY ═══ -->
<style>
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0d1b4a 0%,#1a3a7a 50%,#0d47a1 100%);z-index:1000;display:flex;justify-content:center;align-items:center}
.login-overlay .login-box{background:#fff;border-radius:16px;padding:36px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.login-box h2{font-size:20px;text-align:center;margin-bottom:4px;color:#0d1b4a}
.login-box .sub{text-align:center;font-size:12px;color:#999;margin-bottom:18px}
.login-box label{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:3px}
.login-box input{width:100%;padding:10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;margin-bottom:10px;font-family:inherit}
.login-box input.error{border-color:#c62828;background:#fff5f5}
.login-box .err-msg{color:#c62828;font-size:11px;margin:-6px 0 8px;display:none}
.login-box .err-msg.show{display:block}
.login-box .btn-full{width:100%;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;background:var(--blue)}
.login-box .btn-full:hover{opacity:.85}
.login-box .link{text-align:center;margin-top:10px;font-size:12px;color:var(--blue);cursor:pointer}
.login-box .link:hover{text-decoration:underline}
.login-tabs{display:flex;gap:0;margin-bottom:16px}
.login-tabs span{flex:1;text-align:center;padding:8px;cursor:pointer;font-size:13px;font-weight:600;color:#999;border-bottom:2px solid transparent;transition:.2s}
.login-tabs span.active{color:var(--blue);border-bottom-color:var(--blue)}
.hdr-actions{display:flex;gap:8px;align-items:center}
</style>
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box" id="loginBox"></div>
</div>

<header class="topbar">
  <a class="logo" href="#"><div class="logo-icon">软</div>软安科技 · 快速获取解决方案与报价</a>
  <div class="hdr-actions">
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='ruanan-marketing-platform.html'">🏠 返回首页</button>
    <span style="font-size:12px;color:var(--text)" id="loginUser"></span>
    <button class="btn btn-outline btn-sm" data-action="resetAll">🔄 重新开始</button>
    <button class="btn btn-outline btn-sm" id="adminBtn" style="display:none" onclick="showAdmin()">⚙ 管理</button>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
  </div>
</header>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:20%"></div></div>
  <div class="steps-bar">
    <div class="step-item"><div class="step-num" id="stepNum0">0</div>信息登记</div><span class="step-arrow" id="stepArr0">›</span><div class="step-item"><div class="step-num" id="stepNum1">1</div>选择行业</div>
    <span class="step-arrow" id="stepArr1">›</span>
    <div class="step-item"><div class="step-num" id="stepNum2">2</div>产品需求</div>
    <span class="step-arrow" id="stepArr2">›</span>
    <div class="step-item"><div class="step-num" id="stepNum3">3</div>业务场景</div>
    <span class="step-arrow" id="stepArr3">›</span>
    <div class="step-item"><div class="step-num" id="stepNum4">4</div>项目信息</div>
    <span class="step-arrow" id="stepArr4">›</span>
    <div class="step-item"><div class="step-num" id="stepNum5">5</div>项目关注度选择</div>
    <span class="step-arrow" id="stepArr5">›</span>
    <div class="step-item"><div class="step-num" id="stepNum6">6</div>需求汇总</div>
    <span class="step-arrow" id="stepArr6">›</span>
    <div class="step-item"><div class="step-num" id="stepNum7">7</div>获取报价</div>
  </div>
  <div id="mainContent"></div>
</div>

<script>
// ═══ AUTH ═══
const API=window.location.hostname==='localhost'?'http://localhost:8081':'';var useAPI=!!API;
var authToken=localStorage.getItem('selector_token')||'';
var authUser=null;

async function apiCall(method,url,body){
  var o={method,headers:{}};
  if(authToken)o.headers['Authorization']='Bearer '+authToken;
  if(body instanceof FormData)o.body=body;
  else if(body){o.headers['Content-Type']='application/x-www-form-urlencoded';o.body=body;}
  var r=await fetch(API+url,o);
  var d=await r.json();
  if(!r.ok)throw new Error(d.detail||'请求失败');
  return d;
}
function fd(o){var f=new FormData();for(var k in o)f.append(k,o[k]);return f;}

// Login UI
function showLogin(tab){
  tab=tab||'login';
  var h='<h2>🛡 软安科技 · 快速获取解决方案与报价</h2><div class="sub">请登录或注册后使用</div>';
  h+='<div class="login-tabs"><span class="'+(tab==='login'?'active':'')+'" onclick="showLogin(\'login\')">登录</span><span class="'+(tab==='register'?'active':'')+'" onclick="showLogin(\'register\')">注册</span><span class="'+(tab==='forgot'?'active':'')+'" onclick="showLogin(\'forgot\')">忘记密码</span></div>';
  if(tab==='register'){
    h+='<label>用户名 *</label><input id="regUser" placeholder="4-20位字母或数字"><div class="err-msg" id="regUserErr">用户名需4-20位字母或数字</div>';
    h+='<label>密码 *</label><input id="regPwd" type="password" placeholder="至少6位"><div class="err-msg" id="regPwdErr">密码至少6位</div>';
    h+='<label>邮箱 *</label><input id="regEmail" placeholder="example@company.com"><div class="err-msg" id="regEmailErr">请输入有效邮箱地址</div>';
    h+='<label>手机号</label><input id="regPhone" placeholder="11位手机号">';
    h+='<label>公司</label><input id="regCompany" placeholder="公司全称">';
    h+='<button class="btn-full" onclick="doRegister()">注 册</button>';
    h+='<div class="link" onclick="showLogin(\'login\')">已有账号？立即登录</div>';
  }else if(tab==='forgot'){
    h+='<p style="font-size:12px;color:var(--text);margin-bottom:12px">输入注册时使用的用户名和邮箱，系统将重置密码</p>';
    h+='<label>用户名 *</label><input id="fgUser" placeholder="请输入用户名">';
    h+='<label>邮箱 *</label><input id="fgEmail" placeholder="请输入注册邮箱">';
    h+='<button class="btn-full" onclick="doForgot()">重置密码</button>';
    h+='<div class="link" onclick="showLogin(\'login\')">返回登录</div>';
  }else{
    h+='<label>用户名</label><input id="loginUser" value="admin">';
    h+='<label>密码</label><input id="loginPwd" type="password" value="ruanan2024" onkeydown="if(event.key===\'Enter\')doLogin()">';
    h+='<button class="btn-full" onclick="doLogin()">登 录</button>';
    h+='<div class="link" onclick="showLogin(\'register\')">没有账号？立即注册</div>';
  }
  h+='<div class="err-msg" id="loginErr" style="text-align:center"></div>';
  document.getElementById('loginBox').innerHTML=h;
  if(tab==='login'){document.getElementById('loginUser').focus();}
}
async function doLogin(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPwd').value.trim();
  if(!u||!p){showErr('请输入用户名和密码');return;}
  try{
    var d=await apiCall('POST','/api/login','username='+encodeURIComponent(u)+'&password='+encodeURIComponent(p));
    authToken=d.token;authUser=d;
    localStorage.setItem('selector_token',authToken);
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('loginUser').value='';
    document.getElementById('loginPwd').value='';
    updateUserUI();
  }catch(e){showErr(e.message);}
}
async function doRegister(){
  var u=document.getElementById('regUser').value.trim();
  var p=document.getElementById('regPwd').value.trim();
  var em=document.getElementById('regEmail').value.trim();
  var ph=document.getElementById('regPhone').value.trim();
  var cp=document.getElementById('regCompany').value.trim();
  // Validate
  var ok=true;
  if(!/^[a-zA-Z0-9_一-龥]{4,20}$/.test(u)){document.getElementById('regUserErr').classList.add('show');ok=false;}
  else{document.getElementById('regUserErr').classList.remove('show');}
  if(p.length<6){document.getElementById('regPwdErr').classList.add('show');ok=false;}
  else{document.getElementById('regPwdErr').classList.remove('show');}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){document.getElementById('regEmailErr').classList.add('show');ok=false;}
  else{document.getElementById('regEmailErr').classList.remove('show');}
  if(!ok)return;
  try{
    var d=await apiCall('POST','/api/register',fd({username:u,password:p,email:em,phone:ph,company:cp}));
    authToken=d.token;authUser={username:u,role:'user'};
    localStorage.setItem('selector_token',authToken);
    document.getElementById('loginOverlay').style.display='none';
    updateUserUI();
    toast('注册成功！欢迎使用用户自主选型助手');
  }catch(e){showErr(e.message);}
}
async function doForgot(){
  var u=document.getElementById('fgUser').value.trim();
  var em=document.getElementById('fgEmail').value.trim();
  if(!u||!em){showErr('请填写用户名和邮箱');return;}
  try{
    var d=await apiCall('POST','/api/forgot-password','username='+encodeURIComponent(u)+'&email='+encodeURIComponent(em));
    alert('密码已重置！\n\n新密码：'+d.new_password+'\n\n请使用新密码登录后修改密码。');
    showLogin('login');
  }catch(e){showErr(e.message);}
}
function showErr(m){var e=document.getElementById('loginErr');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},3000);}
function doLogout(){authToken='';authUser=null;localStorage.removeItem('selector_token');document.getElementById('loginOverlay').style.display='flex';document.getElementById('loginUser').textContent='';document.getElementById('adminBtn').style.display='none';showLogin();resetAll();}
function updateUserUI(){
  document.getElementById('loginUser').textContent='👤 '+(authUser?authUser.username:'');
  if(authUser&&authUser.role==='admin')document.getElementById('adminBtn').style.display='';
}

// ═══ FORM VALIDATION ═══
function validateEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function validatePhone(v){return /^1[3-9]\d{9}$/.test(v);}
function validateCompany(v){return v.length>=2&&!/^[\d\s\-]+$/.test(v);}

function computeRecommendations(){
  var scores={},reasons={};
  var ind=state.industry,info=state.projectInfo||{};
  var imap=INDUSTRY_PRODUCT_MAP[ind];
  if(imap){for(var i=0;i<imap.primary.length;i++){var pid=imap.primary[i];scores[pid]=(scores[pid]||0)+3;reasons[pid]=imap.reason;}}
  var pnMap={'pn_t1':'SAST','pn_t2':'SCA','pn_t3':'FIRMWARE','pn_t4':'LLM','pn_t5':'AI_SAST','pn_t6':'SAST'};
  for(var j=0;j<state.productNeeds.length;j++){var nid=pnMap[state.productNeeds[j]];if(nid){scores[nid]=(scores[nid]||0)+4;reasons[nid]=(reasons[nid]||'用户选择该类型产品');}}
  for(var k=0;k<state.bizScenes.length;k++){var bid=state.bizScenes[k];if(bid.charAt(0)==='b'&&bid.charAt(1)==='c'){scores.SCA=(scores.SCA||0)+1;scores.SAST=(scores.SAST||0)+1;}if(bid.charAt(0)==='b'&&bid.charAt(1)==='t'){scores.SAST=(scores.SAST||0)+2;}if(bid.charAt(0)==='b'&&bid.charAt(1)==='s'){scores.SCA=(scores.SCA||0)+2;}}
  if(info.languages&&info.languages.length>0){for(var li=0;li<info.languages.length;li++){var lang=info.languages[li];var lmap={C_C:'SAST',Java:'SAST','C#':'SAST',Python:'SAST',Go:'SAST'};for(var pk in lmap){if(lang.indexOf(pk)>=0||pk.indexOf(lang)>=0){scores[lmap[pk]]=(scores[lmap[pk]]||0)+2;}}}}
  if(info.codeSize){if(info.codeSize.indexOf('固件')>=0){scores.FIRMWARE=(scores.FIRMWARE||0)+3;}else{scores.SAST=(scores.SAST||0)+2;}}
  if(info.focuses&&info.focuses.length>0){for(var fi=0;fi<info.focuses.length;fi++){var f=info.focuses[fi];if(f.indexOf('AI')>=0||f.indexOf('修复')>=0){scores.AI_SAST=(scores.AI_SAST||0)+2;}if(f.indexOf('溯源')>=0||f.indexOf('SBOM')>=0||f.indexOf('供应链')>=0){scores.SCA=(scores.SCA||0)+2;}if(f.indexOf('精准')>=0||f.indexOf('规则')>=0){scores.SAST=(scores.SAST||0)+1;}}}
  if(info.replaceExisting==='是'){scores.SAST=(scores.SAST||0)+1;scores.SCA=(scores.SCA||0)+1;}
  var ranked=[];for(var k in scores)ranked.push({id:k,score:scores[k],reason:reasons[k]||''});ranked.sort(function(a,b){return b.score-a.score;});
  return ranked.slice(0,4);
}

  else if(step===7) app.innerHTML = rStep7();

function updateUI(){
  var pb=document.getElementById('progressBar');if(pb)pb.style.display='';var sb=document.getElementById('stepsBar');if(sb)sb.style.display='';
  document.getElementById('progressBar').style.width = (state.step*12.5)+'%';
  for(let i=0;i<=7;i++){
    const el=document.getElementById('stepNum'+i); if(!el) continue;
    el.className='step-num'+(i===state.step?' active':i<state.step?' done':'');
    if(i<7){ const arr=document.getElementById('stepArr'+i); if(arr) arr.className='step-arrow'+(i<state.step?' done':''); };
  }
}

function goStep(n){
  state.step=n; if(n===0){state.industry=null;state.subIndustry=null;state.productNeeds=[];state.bizScenes=[];state.projectInfo={};state.selectedAdvantages=[];state.customPain='';}
  state.products=[]; render(); window.scrollTo(0,0);
}
function goNextCheck(){
  if(state.step===2&&state.productNeeds.length===0){toast('请至少选择一个产品需求','error');return;}
  if(state.step===3&&state.bizScenes.length===0){toast('请至少选择一个业务场景','error');return;}
  if(state.step===5&&state.selectedAdvantages.length===0){toast('请至少选择一项关注点','error');return;}
  goStep(state.step+1);
}
function selectIndustry(key){ state.industry=key; state.subIndustry=null; state.productNeeds=[]; state.bizScenes=[]; state.products=[]; state.customPain=""; render(); }
function toggleProductNeed(id){ var idx=state.productNeeds.indexOf(id); if(idx>=0)state.productNeeds.splice(idx,1); else state.productNeeds.push(id); render(); }
function toggleBizScene(id){ var idx=state.bizScenes.indexOf(id); if(idx>=0)state.bizScenes.splice(idx,1); else state.bizScenes.push(id); render(); }
function toggleAdvantage(id){ var idx=state.selectedAdvantages.indexOf(id); if(idx>=0)state.selectedAdvantages.splice(idx,1); else state.selectedAdvantages.push(id); render(); }
function toggleLang(lang){ var info=state.projectInfo;if(!info.languages)info.languages=[];var idx=info.languages.indexOf(lang);if(idx>=0)info.languages.splice(idx,1);else info.languages.push(lang);render();}
function toggleFocus(focus){ var info=state.projectInfo;if(!info.focuses)info.focuses=[];var idx=info.focuses.indexOf(focus);if(idx>=0)info.focuses.splice(idx,1);else info.focuses.push(focus);render();}

      '&products='+encodeURIComponent(JSON.stringify(state.products||[]))+

// ═══ EVENT DELEGATION ═══
document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  const param = el.getAttribute('data-param');
  if (action === 'saveUserInfo') saveUserInfo();
  else if (action === 'saveProjectInfo') saveProjectInfo();
  else if (action === 'selectIndustry') selectIndustry(param);
  else if (action === 'selectSubIndustry') { state.subIndustry = param; state.productNeeds = []; state.bizScenes = []; render(); }
  else if (action === 'toggleProductNeed') toggleProductNeed(param);
  else if (action === 'toggleBizScene') toggleBizScene(param);
  else if (action === 'toggleLang') toggleLang(param);
  else if (action === 'toggleFocus') toggleFocus(param);
  else if (action === 'toggleAdvantage') toggleAdvantage(param);
  else if (action === 'goNextCheck') goNextCheck();
  else if (action === 'getQuote') { saveSelectionRecord().then(function(){ window.location.href = 'ruanan-marketing-platform.html#partner'; }); }
  else if (action === 'goStep') { goStep(parseInt(param)); }
  else if (action === 'resetAll') resetAll();
});

render();
