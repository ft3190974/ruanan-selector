version: "3.8"

services:
  app:
    build: .
    container_name: ruanan-app
    restart: always
    mem_limit: 1500M
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - ADMIN_PWD=Ruanan@2026Secure
      - ALLOW_INSECURE_ADMIN_PWD=true
      - CORS_ORIGINS=http://43.139.114.76,http://localhost
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：Nginx 容器（如果用容器化 Nginx 替代宿主机 Nginx）
  nginx:
    image: nginx:alpine
    container_name: ruanan-nginx
    restart: always
    mem_limit: 128M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/app/static:ro
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
