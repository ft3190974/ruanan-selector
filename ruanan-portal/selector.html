<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软安科技 | 智能选型助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif}
body{background:linear-gradient(135deg,#f0f4f8 0%,#e8edf2 100%);min-height:100vh}
:root{
  --blue:#1D4699;--blue-light:#E8EEF8;--blue-dark:#15357a;
  --red:#C00000;--red-light:#FEF2F2;
  --green:#00B050;--green-dark:#20A675;--green-light:#D3F4E6;
  --teal:#007983;--purple:#A850B6;
  --text:#7E7E7E;--text-dark:#505050;--text-darker:#252525;
  --bg:#FFFFFF;--bg-card:#F8FAFC;--border:#E2E8F0;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-lg:0 10px 40px rgba(0,0,0,0.1);
  --radius:14px;
}

/* Topbar */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;color:var(--blue);text-decoration:none}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1D4699,#00B050);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px}
.btn{padding:8px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#1D4699,#15357a);color:#fff;box-shadow:0 2px 8px rgba(29,70,153,0.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(29,70,153,0.35)}
.btn-outline{background:#fff;color:var(--text-dark);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg-card)}
.btn-green{background:linear-gradient(135deg,#00B050,#20A675);color:#fff;box-shadow:0 2px 8px rgba(0,176,80,0.25)}
.btn-red{background:var(--red);color:#fff}
.btn-lg{padding:12px 32px;font-size:16px;border-radius:12px}
.btn-sm{padding:5px 14px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}

/* Layout */
.container{max-width:960px;margin:0 auto;padding:28px 20px}

/* Steps bar */
.steps-bar{display:flex;align-items:center;justify-content:center;margin-bottom:32px;gap:0}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);font-weight:500;white-space:nowrap}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--border);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:all 0.3s}
.step-num.active{background:var(--blue);box-shadow:0 0 0 4px var(--blue-light)}
.step-num.done{background:var(--green);box-shadow:none}
.step-arrow{color:var(--border);margin:0 8px;font-size:16px;transition:all 0.3s}
.step-arrow.done{color:var(--green)}

/* Card */
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp 0.35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:22px;font-weight:800;color:var(--text-darker);margin-bottom:4px}
.sec-sub{font-size:14px;color:var(--text);margin-bottom:24px;line-height:1.6}
.sec-label{font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}

/* Industry grid */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ind-card{border:2px solid var(--border);border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:center;transition:all 0.25s;background:#fff}
.ind-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(29,70,153,0.1);transform:translateY(-2px)}
.ind-card.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 4px rgba(29,70,153,0.08)}
.ind-icon{font-size:34px;margin-bottom:6px}
.ind-name{font-weight:700;font-size:14px;color:var(--text-darker)}
.ind-reg{font-size:11px;color:var(--text);margin-top:4px;line-height:1.3}

/* Scenario tags */
.scene-group{margin-bottom:20px}
.scene-group-title{font-size:15px;font-weight:700;color:var(--text-darker);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.scene-group-title .icon{font-size:20px}
.scene-tags{display:flex;flex-wrap:wrap;gap:8px}
.scene-tag{border:2px solid var(--border);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-dark);transition:all 0.2s;background:#fff;display:flex;align-items:center;gap:6px}
.scene-tag:hover{border-color:var(--green);background:#f8fdf9}
.scene-tag.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.scene-tag .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.2s}
.scene-tag.selected .dot{background:var(--green)}
.scene-tag .desc{font-size:11px;color:var(--text);font-weight:400;margin-top:2px}
.scene-tag .price-tag{font-size:11px;color:var(--blue);font-weight:700;margin-top:2px}

/* Budget range */
.budget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.budget-card{border:2px solid var(--border);border-radius:var(--radius);padding:20px 14px;cursor:pointer;text-align:center;transition:all 0.25s;background:#fff}
.budget-card:hover{border-color:var(--blue)}
.budget-card.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 4px rgba(29,70,153,0.08)}
.budget-range{font-size:20px;font-weight:800;color:var(--blue);margin-bottom:4px}
.budget-label{font-size:12px;color:var(--text)}
.budget-desc{font-size:11px;color:var(--text);margin-top:6px}

/* Pain points */
.pain-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.pain-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.25s;background:#fff;text-align:left}
.pain-card:hover{border-color:var(--red)}
.pain-card.selected{border-color:var(--red);background:var(--red-light)}
.pain-card .pain-icon{font-size:24px;margin-bottom:6px}
.pain-card .pain-title{font-weight:600;font-size:14px;color:var(--text-darker);margin-bottom:4px}
.pain-card .pain-desc{font-size:12px;color:var(--text);line-height:1.5}

/* Result */
.result-header{text-align:center;padding:16px 0 24px}
.result-title{font-size:24px;font-weight:800;color:var(--text-darker)}
.result-sub{font-size:14px;color:var(--text);margin-top:4px}
.rec-product{border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:12px;background:var(--bg-card)}
.rec-product .rec-name{font-weight:700;font-size:17px;color:var(--text-darker);margin-bottom:4px}
.rec-product .rec-brand{font-size:13px;color:var(--blue);font-weight:600;margin-bottom:8px}
.rec-product .rec-features{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.rec-feature{font-size:11px;padding:3px 10px;background:var(--green-light);color:var(--green-dark);border-radius:6px;font-weight:500}
.rec-product .rec-scene{font-size:12px;color:var(--teal);margin-top:8px}
.rec-price-box{text-align:right;flex-shrink:0}
.rec-price{font-size:22px;font-weight:900;color:var(--blue)}
.rec-price-label{font-size:12px;color:var(--text)}

/* Quote summary */
.quote-card{background:linear-gradient(135deg,#1D4699,#1a3f8a);color:#fff;border-radius:16px;padding:28px 32px;margin-bottom:20px}
.quote-card .total{font-size:44px;font-weight:900;line-height:1;margin:8px 0}
.quote-card .total-label{font-size:14px;opacity:0.8}
.quote-note{background:var(--bg-card);border-radius:12px;padding:16px 20px;font-size:13px;color:var(--text-dark);line-height:1.8}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-darker);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;transition:all 0.2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,70,153,0.08)}
.form-group textarea{resize:vertical;min-height:80px}

/* Toast */
.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;color:#fff;font-weight:500;font-size:14px;z-index:999;animation:slideIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* progress */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:28px;transition:all 0.3s}
.progress-fill{height:100%;background:linear-gradient(90deg,#1D4699,#00B050);border-radius:2px;transition:all 0.4s ease}

@media(max-width:768px){
  .grid3,.grid4{grid-template-columns:repeat(2,1fr)}
  .grid2,.form-row{grid-template-columns:1fr}
  .budget-grid{grid-template-columns:repeat(2,1fr)}
  .pain-cards{grid-template-columns:1fr}
  .card{padding:20px}
  .steps-bar{flex-wrap:wrap;gap:4px}
  .step-arrow{display:none}
}
</style>
</head>

// ===== Render Engine =====
function render(){
  const app = document.getElementById('mainContent');
  const {step} = state;
  updateUI();
  if(step===0) app.innerHTML = rStep0();
  else if(step===1) app.innerHTML = rStep1();
  else if(step===2) app.innerHTML = rStep2();
  else if(step===3) app.innerHTML = rStep3();
  else if(step===4) app.innerHTML = rStep4();
  else if(step===5) app.innerHTML = rStep5();
}

function updateUI(){
  // progress
  document.getElementById('progressBar').style.width = (state.step*16.7)+'%';
  // step nums
  for(let i=0;i<=5;i++){
    const el=document.getElementById('stepNum'+i); if(!el) continue;
    el.className='step-num'+(i===state.step?' active':i<state.step?' done':'');
    if(i<5){ const arr=document.getElementById('stepArr'+i); if(arr) arr.className='step-arrow'+(i<state.step?' done':''); };
  }
}

function rStep5(){
  state.customPain = document.getElementById('customPain')?.value||'';

  // 智能推荐产品
  const ind = INDUSTRIES[state.industry];
  const budget = BUDGET_RANGES.find(b=>b.id===state.budget);
  const maxProducts = budget?budget.maxProducts:1;

  // 基于行业推荐 + 场景匹配加权
  let scores = {};
  for(const pid of ind.rec){ scores[pid]=(scores[pid]||0)+3; } // 行业推荐+3

  // 场景加分
  for(const sid of state.scenes){
    if(sid==='c1'||sid==='c4'||sid==='c5'){ scores['SAST']=(scores['SAST']||0)+2; scores['FIRMWARE']=(scores['FIRMWARE']||0)+1; }
    if(sid==='c2'){ scores['SCA']=(scores['SCA']||0)+3; }
    if(sid==='c3'){ scores['SAST']=(scores['SAST']||0)+2; scores['SCA']=(scores['SCA']||0)+1; }
    if(sid==='t1'){ scores['SAST']=(scores['SAST']||0)+3; }
    if(sid==='t2'){ scores['SCA']=(scores['SCA']||0)+3; }
    if(sid==='t3'){ scores['FIRMWARE']=(scores['FIRMWARE']||0)+3; }
    if(sid==='t4'){ scores['LLM']=(scores['LLM']||0)+3; } if(sid==='t5'){ scores['LLM']=(scores['LLM']||0)+3; } if(sid==='t7'){ scores['SAST']=(scores['SAST']||0)+2; scores['SCA']=(scores['SCA']||0)+1; } if(sid==='t6'){ scores['AI_SAST']=(scores['AI_SAST']||0)+3; }
    
    
    if(sid==='s1'||sid==='s6'){ scores['SAST']=(scores['SAST']||0)+1; }
    if(sid==='s2'){ scores['FIRMWARE']=(scores['FIRMWARE']||0)+2; }
    if(sid==='s3'){ scores['SAST']=(scores['SAST']||0)+1; }
    if(sid==='s4'){ scores['SAST']=(scores['SAST']||0)+1; scores['SCA']=(scores['SCA']||0)+1; }
    if(sid==='s5'){ scores['SAST']=(scores['SAST']||0)+1; }
  }

  // 痛点加分
  const painMap = {p1:'SAST',p2:'SAST',p3:'SCA',p4:'SAST',p5:'SCA',p6:'FIRMWARE',p7:'LLM',p8:'AI_SAST'};
  for(const pid of state.pains){ const prod=painMap[pid]; if(prod) scores[prod]=(scores[prod]||0)+2; }

  // 排序取top
  const ranked = Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  const budgetFactor = budget?budget.factor:1.0;

  // 推荐产品卡片
  let h=`<div class="card"><div class="sec-label">STEP 5 · 推荐方案</div><h2 class="sec-title">${ind.icon} ${state.industry}行业 · 推荐方案</h2><p class="sec-sub">基于行业「${state.industry}」、${state.scenes.length}个需求场景、预算「${budget?budget.range:''}」，智能推荐以下产品组合</p>`;

  for(const pid of recommended){
    const p=PRODUCTS[pid]; if(!p) continue;
    h+=`<div class="rec-product"><div style="display:flex;justify-content:space-between;align-items:flex-start">

      <div class="rec-price-box"><div class="rec-price">${pid==='AI_SAST'?aiSastPrice+'万':unitPrice+'万'}</div><div class="rec-price-label">/${pid==='AI_SAST'?'用户/月':'年/套'}</div></div>
    </div></div>`;
  }

  // 服务报价
  let serviceTotal = 0;
  const serviceItems = [];
  const servicePriceMap = {s1:{name:'代码安全审计服务',price:2,cond:'≤10GB源码'},s2:{name:'固件安全测试服务',price:1,cond:'≤20GB固件'},s3:{name:'开源合规审计服务',price:5,cond:'≤20GB源码'}};
  for(const sid of state.scenes){
    const sp = servicePriceMap[sid];
    if(sp){ serviceItems.push(sp); serviceTotal += sp.price; }

  // 报价汇总

  h+=`<div class="quote-card">
    <div class="total-label">💰 参考报价（${priceLabel}）</div>
    <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap"><div class="total">${grandTotal}万</div><div style="font-size:14px;opacity:0.8">/年</div></div>
    <div class="total-label">${productCount}个产品（每产品5用户1并发·全功能）${serviceTotal>0?' + '+serviceItems.length+'项测试服务':''}</div>
  </div>`;

  h+=`<div class="quote-note"><b>📌 报价明细：</b><br>`;
  h+=`<b>【产品许可】</b><br>`;

    h+=`· 服务合计：${serviceTotal}万/次<br>`;
    h+=`<br>· ⚠️ 超出限制范围需人工介入评估<br>`;
  }
  h+=`· 以上为参考报价，正式报价需根据具体需求定制</div>`;

  // 说明
  h+=`<div class="quote-note">
    <b>📌 报价说明：</b><br>
    · 每款产品标准价 <b>50万/年</b>（含5用户1并发，全功能模块）<br>
    · 组合优惠：${priceLabel}<br>
    · 如含测试服务，服务费根据项目范围另行报价<br>
    · 以上为参考报价，正式报价需根据具体规模和需求定制<br>
    ${budgetFactor!==1?`· ⚠️ 推荐方案总价与您的预算「${budget?.range}」${discountedTotal*10000>parseInt(budget?.range||'0')*10000?'有一定差距，建议调整产品组合或预算':'基本匹配'}`:''}
  </div>`;

  // 场景匹配说明
  if(state.scenes.length>0 || state.pains.length>0){
    h+=`<div class="card card-sm"><div style="font-weight:700;color:var(--text-darker);margin-bottom:10px">📋 需求匹配说明</div><div style="font-size:13px;color:var(--text);line-height:1.8">`;
    const sceneNames = [...SCENARIOS.compliance,...SCENARIOS.tool,...SCENARIOS.service];
    h+=`<b>已选场景：</b>${state.scenes.map(sid=>{const s=sceneNames.find(x=>x.id===sid);return s?s.title:sid}).join('、')}<br>`;
    if(state.pains.length>0) h+=`<b>痛点关注：</b>${state.pains.map(pid=>{const p=document.querySelector(`.pain-card[onclick*="${pid}"]`);return p?p.querySelector('.pain-title').textContent:pid}).join('、')}<br>`;
    h+=`<b>推荐逻辑：</b>基于行业匹配度(权重3)+场景需求匹配(权重2-3)+痛点匹配(权重2)，综合评分后推荐Top ${maxProducts}产品。</div></div>`;
  }

  h+=`</div>`;

  // 行动选项
  const optCardStyle = 'border:2px solid var(--border);border-radius:14px;padding:20px 24px;cursor:pointer;transition:all 0.25s;background:#fff;text-align:center;flex:1;min-width:200px';
  const optHover = 'onmouseover="this.style.borderColor=this.dataset.color;this.style.background=this.dataset.bg" onmouseout="this.style.borderColor=this.dataset.defaultBorder;this.style.background=this.dataset.defaultBg"';
  h+=`<div class="card"><h2 class="sec-title">📋 下一步选择</h2><p class="sec-sub">根据推荐方案，选择你需要的后续服务</p>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">`;
  h+=`<div ${optHover} data-color="var(--blue)" data-bg="var(--blue-light)" data-default-border="var(--border)" data-default-bg="#fff" style="${optCardStyle}" data-action="selectOption" data-param="quote"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-weight:700;color:var(--text-darker);margin-bottom:4px">生成报价与方案</div><div style="font-size:12px;color:var(--text)">生成正式报价单<br>和解决方案文档</div></div>`;
  h+=`<div ${optHover} data-color="var(--green)" data-bg="var(--green-light)" data-default-border="var(--border)" data-default-bg="#fff" style="${optCardStyle}" data-action="selectOption" data-param="contact"><div style="font-size:32px;margin-bottom:8px">📞</div><div style="font-weight:700;color:var(--text-darker);margin-bottom:4px">联系销售</div><div style="font-size:12px;color:var(--text)">直接与我们的<br>商务经理对接</div></div>`;
  h+=`<div ${optHover} data-color="var(--purple)" data-bg="#F8F4FC" data-default-border="var(--border)" data-default-bg="#fff" style="${optCardStyle}" data-action="selectOption" data-param="communicate"><div style="font-size:32px;margin-bottom:8px">💬</div><div style="font-weight:700;color:var(--text-darker);margin-bottom:4px">进一步交流</div><div style="font-size:12px;color:var(--text)">留下需求和联系<br>方式，深入沟通</div></div>`;
  h+=`<div ${optHover} data-color="var(--teal)" data-bg="#E8F6F7" data-default-border="var(--border)" data-default-bg="#fff" style="${optCardStyle}" data-action="selectOption" data-param="poc"><div style="font-size:32px;margin-bottom:8px">🔬</div><div style="font-weight:700;color:var(--text-darker);margin-bottom:4px">申请POC测试</div><div style="font-size:12px;color:var(--text)">申请产品试用<br>概念验证测试</div></div>`;
  h+=`</div></div>`;

  // 表单区 - 默认隐藏，选择后展开
  h+=`<div id="optionForm" style="display:none"><div class="card" id="optionFormContent"></div></div>`;

  h+=`<div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
    <button class="btn btn-outline" data-action="goStep" data-param="4">← 调整痛点</button>
    <button class="btn btn-outline" data-action="resetAll">🔄 重新选型</button>
  </div>`;
  return h;
}

// ===== Actions =====
function saveUserInfo(){ var u=state.userInfo; u.company=document.getElementById('uCompany')?.value.trim()||''; u.address=document.getElementById('uAddress')?.value.trim()||''; u.contact=document.getElementById('uContact')?.value.trim()||''; u.title=document.getElementById('uTitle')?.value.trim()||''; u.email=document.getElementById('uEmail')?.value.trim()||''; u.phone=document.getElementById('uPhone')?.value.trim()||''; if(!u.company||!u.contact||!u.title||!u.email||!u.phone){ toast('请填写所有必填项','error'); return; } state.step=1; render(); window.scrollTo(0,0); }
function selectIndustry(key){ state.industry=key; state.scenes=[]; state.products=[]; state.budget=null; state.pains=[]; state.customPain=""; render(); }
function saveProjectInfo(){ var info=state.projectInfo||{}; info.budget=document.getElementById('pBudget')?.value.trim()||''; info.teamSize=document.getElementById('pTeamSize')?.value.trim()||''; info.languages=document.getElementById('pLanguages')?.value.trim()||''; info.timeline=document.getElementById('pTimeline')?.value.trim()||''; if(!info.budget||!info.teamSize||!info.languages||!info.timeline){ toast('请填写所有必填项','error'); return; } state.projectInfo=info; state.step=4; render(); window.scrollTo(0,0); }
function selectBudget(bid){ state.budget=bid; render(); }
function selectOption(opt){
  const formEl = document.getElementById('optionForm');
  const contentEl = document.getElementById('optionFormContent');
  const ind = INDUSTRIES[state.industry];
  const sceneNames = [...SCENARIOS.compliance,...SCENARIOS.tool,...SCENARIOS.service];
  const sceneList = state.scenes.map(sid=>{const s=sceneNames.find(x=>x.id===sid);return s?s.title:sid}).join('、');

  let title='', body='', btnText='', btnAction='';

  if(opt==='quote'){
    title='📋 生成报价与解决方案';
    btnText='📩 生成正式报价方案';
    btnAction='submitAction';
    body=`<p class="sec-sub">我们将根据以下需求生成正式报价单和解决方案文档，请确认并补充联系方式</p>
    <div class="quote-note"><b>需求摘要：</b><br>· 行业：${ind.icon} ${state.industry}<br>· 需求场景：${sceneList}<br>· 预算：${BUDGET_RANGES.find(b=>b.id===state.budget)?.range||'未选'}<br>· 痛点：${state.pains.join('、')||'未选'}</div>
    <div class="form-row"><div class="form-group"><label>公司名称 *</label><input id="optCompany" placeholder="请输入公司全称"></div><div class="form-group"><label>联系人 *</label><input id="optName" placeholder="请输入联系人姓名"></div></div>
    <div class="form-row"><div class="form-group"><label>手机号 *</label><input id="optPhone" type="tel" placeholder="请输入手机号"></div><div class="form-group"><label>邮箱</label><input id="optEmail" type="email" placeholder="请输入邮箱"></div></div>
    <div class="form-group"><label>补充说明</label><textarea id="optNote" placeholder="项目背景、特殊需求、时间要求...">${state.customPain||''}</textarea></div>`;
  }else if(opt==='contact'){
    title='📞 联系销售';
    btnText='📞 提交联系请求';
    btnAction='submitAction';
    body=`<p class="sec-sub">我们的商务经理将尽快与您联系，请留下联系方式</p>
    <div class="form-row"><div class="form-group"><label>公司名称 *</label><input id="optCompany" placeholder="请输入公司全称"></div><div class="form-group"><label>联系人 *</label><input id="optName" placeholder="请输入联系人姓名"></div></div>
    <div class="form-row"><div class="form-group"><label>手机号 *</label><input id="optPhone" type="tel" placeholder="请输入手机号"></div><div class="form-group"><label>邮箱</label><input id="optEmail" type="email" placeholder="请输入邮箱"></div></div>
    <div class="form-group"><label>感兴趣的产品/服务</label><textarea id="optNote" placeholder="请简述你关注的产品或服务...">${sceneList}</textarea></div>`;
  }else if(opt==='communicate'){
    title='💬 进一步交流';
    btnText='💬 提交需求信息';
    btnAction='submitAction';
    body=`<p class="sec-sub">请留下详细需求和联系方式，我们将安排资深技术专家与您深入沟通</p>
    <div class="form-row"><div class="form-group"><label>公司名称 *</label><input id="optCompany" placeholder="请输入公司全称"></div><div class="form-group"><label>联系人 *</label><input id="optName" placeholder="请输入联系人姓名"></div></div>
    <div class="form-row"><div class="form-group"><label>手机号 *</label><input id="optPhone" type="tel" placeholder="请输入手机号"></div><div class="form-group"><label>邮箱</label><input id="optEmail" type="email" placeholder="请输入邮箱"></div></div>
    <div class="form-group"><label>期望交流的内容 *</label><textarea id="optNote" placeholder="请描述你希望了解的技术细节、关注的场景、现有的安全体系..."></textarea></div>
    <div class="form-group"><label>方便沟通的时间</label><select id="optTime"><option value="">请选择</option><option>工作日 9:00-12:00</option><option>工作日 14:00-18:00</option><option>随时均可</option></select></div>`;
  }else if(opt==='poc'){
    title='🔬 申请POC测试';
    btnText='🔬 提交POC申请';
    btnAction='submitAction';
    body=`<p class="sec-sub">申请产品试用和概念验证测试，我们将根据您的需求安排POC环境</p>
    <div class="form-row"><div class="form-group"><label>公司名称 *</label><input id="optCompany" placeholder="请输入公司全称"></div><div class="form-group"><label>联系人 *</label><input id="optName" placeholder="请输入联系人姓名"></div></div>
    <div class="form-row"><div class="form-group"><label>手机号 *</label><input id="optPhone" type="tel" placeholder="请输入手机号"></div><div class="form-group"><label>邮箱</label><input id="optEmail" type="email" placeholder="请输入邮箱"></div></div>
    <div class="form-row"><div class="form-group"><label>期望测试产品</label><select id="optProduct" multiple style="min-height:100px"><option>SAST 静态代码分析</option><option>SCA 软件成分分析</option><option>固件安全测试</option><option>大模型安全测试</option><option>AI SAST 智能代码分析</option></select></div><div class="form-group"><label>部署方式</label><select id="optDeploy"><option value="">请选择</option><option>本地部署</option><option>私有云</option><option>涉密离线环境</option><option>SaaS试用</option></select></div></div>
    <div class="form-group"><label>测试场景说明</label><textarea id="optNote" placeholder="请描述期望测试的代码类型、语言、规模等..."></textarea></div>
    <div class="form-group"><label>期望测试时间</label><input id="optTestDate" type="date"></div>`;
  }

  contentEl.innerHTML = `<h2 class="sec-title">${title}</h2>${body}
    <button class="btn btn-green btn-lg" data-action="${btnAction}" data-param="${opt}" style="width:100%;justify-content:center;margin-top:8px">${btnText}</button>`;
  formEl.style.display = 'block';
  formEl.scrollIntoView({behavior:'smooth'});
}
function submitActionForm(opt){
  const c = document.getElementById('optCompany')?.value.trim();
  const n = document.getElementById('optName')?.value.trim();
  const p = document.getElementById('optPhone')?.value.trim();
  if(!c||!n||!p){ toast('请填写公司名称、联系人和手机号','error'); return; }
  const data = {
    type: opt, company:c, name:n, phone:p,
    email: document.getElementById('optEmail')?.value||'',
    note: document.getElementById('optNote')?.value||'',
    industry: state.industry, scenes: state.scenes, budget: state.budget, pains: state.pains,
    time: new Date().toLocaleString('zh-CN')
  };
  const leads=JSON.parse(localStorage.getItem('ruanan_leads')||'[]'); leads.push(data);
  localStorage.setItem('ruanan_leads',JSON.stringify(leads));
  const labels = {quote:'报价方案',contact:'销售联系',communicate:'需求交流',poc:'POC申请'};
  toast('✅ '+labels[opt]+'请求已提交！我们将尽快联系您');
  console.log('提交:', data);
  setTimeout(()=>resetAll(),2000);
}
function goStep(n){
  if(n===5) state.step=5;
  else if(n===4){ state.step=4; }
  else state.step=n;
  state.products=[]; render(); window.scrollTo(0,0);
}
function toggleScene(id){
  const idx=state.scenes.indexOf(id);
  if(idx>=0) state.scenes.splice(idx,1); else state.scenes.push(id);
  render();
}
function togglePain(id){
  const idx=state.pains.indexOf(id);
  if(idx>=0) state.pains.splice(idx,1); else state.pains.push(id);
  render();
}
function resetAll(){ state={step:0,userInfo:{company:'',address:'',contact:'',title:'',email:'',phone:''},industry:null,scenes:[],budget:null,pains:[],customPain:'',products:[],deploy:'local'}; render(); }

function toast(msg,t){let d=document.createElement('div');d.className='toast '+(t||'success');d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

// ===== Event delegation =====
document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  const param = el.getAttribute('data-param');
  const savePain = el.getAttribute('data-savepain');
  if (action === 'saveUserInfo') saveUserInfo();
  else if (action === 'saveProjectInfo') saveProjectInfo();
  else if (action === 'selectIndustry') selectIndustry(param);
  else if (action === 'selectBudget') selectBudget(param);
  else if (action === 'toggleScene') toggleScene(param);
  else if (action === 'togglePain') togglePain(param);
  else if (action === 'goStep') {
    if (savePain === 'true') state.customPain = document.getElementById('customPain')?.value || '';
    goStep(parseInt(param));
  }
  else if (action === 'resetAll') resetAll();
  else if (action === 'submitQuote') submitQuote();
  else if (action === 'selectOption') selectOption(param);
  else if (action === 'submitAction') submitActionForm(param);
});

function submitQuote(){
  const c=document.getElementById('fCompany')?.value.trim();
  const n=document.getElementById('fName')?.value.trim();
  const p=document.getElementById('fPhone')?.value.trim();
  if(!c||!n||!p){toast('请填写公司名称、联系人和手机号','error');return}
  const servicePriceMap={s1:'代码审计2万/次',s2:'固件测试1万/次',s3:'开源合规5万/次'};
  const svcs=state.scenes.filter(s=>servicePriceMap[s]).map(s=>servicePriceMap[s]);
  const data={company:c,name:n,phone:p,email:document.getElementById('fEmail')?.value.trim()||'',note:document.getElementById('fNote')?.value.trim()||'',industry:state.industry,scenes:state.scenes,services:svcs,budget:state.budget,pains:state.pains,customPain:state.customPain,deploy:state.deploy,time:new Date().toLocaleString('zh-CN')};
  const leads=JSON.parse(localStorage.getItem('ruanan_leads')||'[]');leads.push(data);localStorage.setItem('ruanan_leads',JSON.stringify(leads));
  console.log('选型提交:',data);
  toast('✅ 方案已提交！商务经理将在1个工作日内联系您');
  setTimeout(()=>resetAll(),2000);
}

render();
</script>
</body>
</html>
