<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>软安科技华南 · 营销管理工作台</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;height:100%}
body{font-family:'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:#F1F5F9;color:#1E293B;line-height:1.6;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{
  --brand:#1E2330;--brand-light:#2A3140;--brand-dark:#141820;
  --accent:#5C3D99;--accent-light:#7B5CB8;--accent-bg:rgba(92,61,153,0.06);--accent-bg2:rgba(92,61,153,0.12);
  --gold:#C8921A;--gold-light:#E5AA2C;--gold-bg:rgba(200,146,26,0.08);
  --success:#059669;--success-bg:rgba(5,150,105,0.08);
  --danger:#DC2626;--danger-bg:rgba(220,38,38,0.08);
  --warning:#D97706;--warning-bg:rgba(217,119,6,0.08);
  --info:#2563EB;--info-bg:rgba(37,99,235,0.08);
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --bg:#F1F5F9;--surface:#FFFFFF;--surface2:#F8FAFC;
  --border:#E2E8F0;--border2:#CBD5E1;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 12px 36px rgba(0,0,0,0.08);
  --trans:0.2s cubic-bezier(0.4,0,0.2,1);
}
a{color:inherit;text-decoration:none}svg{display:block}

/* ═══ LAYOUT ═══ */
.layout{display:flex;height:100vh;overflow:hidden}

/* ═══ SIDEBAR ═══ */
.sidebar{width:260px;background:var(--brand);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:100}
.sidebar-brand{padding:22px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.sb-logo{width:36px;height:36px;border-radius:10px;background:#1E2330;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
.sb-title{font-weight:700;font-size:14px;letter-spacing:-0.2px}
.sb-sub{font-size:10px;color:rgba(255,255,255,0.4);font-weight:400}

.sidebar-user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.7);flex-shrink:0}
.u-avatar{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.u-name{font-weight:600;color:#fff}.u-role{font-size:10px;opacity:0.5}

.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.sn-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.25);padding:16px 10px 6px;font-weight:700}
.sn-section:first-child{padding-top:4px}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);transition:var(--trans);cursor:pointer;margin-bottom:2px}
.sidebar-nav a:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.sidebar-nav a.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(92,61,153,0.35)}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.nav-badge{font-size:10px;padding:1px 7px;border-radius:100px;background:var(--danger);color:#fff;margin-left:auto;font-weight:600}

.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.sidebar-footer a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;transition:var(--trans)}
.sidebar-footer a:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7)}

@media(max-width:1024px){.sidebar{width:72px}.sidebar-brand .sb-title,.sidebar-brand .sb-sub{display:none}.sidebar-brand{padding:16px;justify-content:center}.sidebar-user{display:none}.sn-section{display:none}.sidebar-nav a{justify-content:center;padding:12px}.sidebar-nav a span:not(.nav-icon){display:none}.sidebar-footer a span{display:none}.sidebar-footer a{justify-content:center}}
@media(max-width:640px){.sidebar{display:none}}

/* ═══ MAIN CONTENT ═══ */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-breadcrumb{font-size:13px;color:var(--text2)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:var(--trans);font-family:inherit}
.tb-btn.primary{background:var(--accent);color:#fff}.tb-btn.primary:hover{background:var(--accent-light)}
.tb-btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.tb-btn.ghost:hover{background:var(--surface2)}
.tb-btn.gold{background:var(--gold);color:#fff}.tb-btn.gold:hover{background:var(--gold-light)}
.main-content{flex:1;padding:24px 28px 40px;max-width:1400px}
@media(max-width:640px){.topbar{padding:0 14px}.main-content{padding:16px 12px 32px}}

/* ═══ PAGE HEADER ═══ */
.page-header{margin-bottom:28px}
.ph-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ph-eyebrow::before{content:'';width:16px;height:2px;background:var(--accent);border-radius:1px}
.ph-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px}
.ph-sub{font-size:14px;color:var(--text2);max-width:600px;line-height:1.6}
.page-header.center{text-align:center;display:flex;flex-direction:column;align-items:center}
.page-header.center .ph-eyebrow{justify-content:center}.page-header.center .ph-eyebrow::before{display:none}.page-header.center .ph-eyebrow::after{content:'';width:16px;height:2px;background:var(--accent);border-radius:1px}

/* ═══ STAT CARDS ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;transition:var(--trans)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:32px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px}
.stat-change{font-size:11px;font-weight:600}.stat-change.up{color:var(--success)}.stat-change.down{color:var(--danger)}
.stat-card.accent{border-left:3px solid var(--accent)}.stat-card.gold{border-left:3px solid var(--gold)}.stat-card.success{border-left:3px solid var(--success)}.stat-card.info{border-left:3px solid var(--info)}
@media(max-width:1024px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.stat-grid{grid-template-columns:1fr}}

/* ═══ QUICK ACTIONS ═══ */
.qaction-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.qaction-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:14px}
.qaction-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.qa-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.qa-icon.purple{background:var(--accent-bg2);color:var(--accent)}.qa-icon.gold{background:var(--gold-bg);color:var(--gold)}.qa-icon.success{background:var(--success-bg);color:var(--success)}.qa-icon.info{background:var(--info-bg);color:var(--info)}
.qa-body{flex:1}.qa-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px}.qa-desc{font-size:11px;color:var(--text3)}
@media(max-width:1024px){.qaction-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.qaction-grid{grid-template-columns:1fr}}

/* ═══ CARDS ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 28px;box-shadow:var(--shadow);transition:var(--trans)}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ch-title{font-size:16px;font-weight:700;color:var(--text)}.ch-action{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer}

/* ═══ GRIDS ═══ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:1024px){.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-2,.grid-3,.grid-4,.grid-2-1{grid-template-columns:1fr}}

/* Exam styles */
.qp-dots{display:flex;gap:6px;margin-bottom:16px}
.qp-dot{width:24px;height:4px;border-radius:2px;background:var(--border)}
.qp-dot.done{background:var(--success)}
.qp-dot.wrong{background:var(--danger)}
.qp-dot.cur{background:var(--accent)}
.exam-opt{padding:14px 18px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--trans);font-size:15px;font-weight:500}
.exam-opt:hover{border-color:var(--accent);background:var(--accent-bg)}
.exam-opt.selected{border-color:var(--accent);background:var(--accent-bg2);color:var(--accent);font-weight:600}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid transparent;transition:var(--trans);font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-light);box-shadow:0 4px 12px rgba(92,61,153,0.3)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-light)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:0.9}
.btn-outline{background:var(--surface);color:var(--text2);border-color:var(--border)}.btn-outline:hover{background:var(--surface2);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--text2);border:none}.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}.btn-lg{padding:13px 28px;font-size:15px;border-radius:10px}
.btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}

/* ═══ PRODUCT CARDS ═══ */
.prod-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:var(--trans);display:flex;flex-wrap:wrap}
.prod-item:hover{box-shadow:var(--shadow-lg);border-color:var(--accent)}
.pi-visual{width:260px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;color:#fff;text-align:center;min-height:240px}
.pi-visual.purple{background:linear-gradient(150deg,#1e1b4b,#3b0764)}
.pi-visual.gold{background:linear-gradient(150deg,#1a1007,#4a2f00)}
.pi-visual.blue{background:linear-gradient(150deg,#0b1829,#1e3a5f)}
.pi-visual.teal{background:linear-gradient(150deg,#042222,#0d4d46)}
.pi-icon{font-size:42px;margin-bottom:8px}.pi-name{font-weight:800;font-size:18px}.pi-sub{font-size:11px;opacity:0.6;margin:4px 0 10px}.pi-price{font-weight:900;font-size:20px}.pi-price-label{font-size:10px;opacity:0.5}
.pi-body{flex:1;padding:24px 28px;min-width:300px}
.pi-desc{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px}
.pi-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.pi-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}.pi-tag{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--accent-bg);color:var(--accent);font-weight:500}
@media(max-width:768px){.pi-visual{width:100%}}

/* ═══ SOLUTION CARDS ═══ */
.sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sol-nav-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 20px;cursor:pointer;transition:var(--trans);text-align:center}
.sol-nav-card:hover{border-color:var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.sn-icon{font-size:36px;margin-bottom:10px}.sn-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px}.sn-desc{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:1024px){.sol-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.sol-grid{grid-template-columns:1fr}}

/* ═══ BLOG / KB LAYOUT ═══ */
.blog-layout{display:grid;grid-template-columns:1fr 320px;gap:24px}
.blog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;transition:var(--trans);cursor:pointer}
.blog-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.bc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:12px}
.bc-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.4}
.bc-title:hover{color:var(--accent)}
.bc-category{font-size:11px;padding:3px 10px;border-radius:100px;background:var(--accent-bg);color:var(--accent);font-weight:600;white-space:nowrap;flex-shrink:0}
.bc-excerpt{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.bc-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text3)}
.bc-stat{display:flex;align-items:center;gap:4px}.bc-author{font-weight:600;color:var(--text2)}
.bc-tags{display:flex;gap:6px;margin-top:8px}.bc-tags span{font-size:10px;color:var(--accent);font-weight:500;background:var(--accent-bg);padding:2px 8px;border-radius:4px}
@media(max-width:768px){.blog-layout{grid-template-columns:1fr}}

/* ═══ ASK FORM ═══ */
.ask-form{background:var(--surface);border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:20px 24px}
.af-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ask-form input,.ask-form textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:var(--trans);margin-bottom:10px;background:var(--surface)}
.ask-form input:focus,.ask-form textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.ask-form textarea{resize:vertical;min-height:80px}

/* ═══ DATA TABLE ═══ */
.data-table{width:100%;font-size:13px;border-collapse:collapse}
.data-table th,.data-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.data-table th{font-weight:600;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;background:var(--surface2)}
.data-table tr:hover{background:var(--surface2)}

/* ═══ BADGES ═══ */
.badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-green{background:var(--success-bg);color:var(--success)}.badge-yellow{background:var(--warning-bg);color:var(--warning)}
.badge-red{background:var(--danger-bg);color:var(--danger)}.badge-blue{background:var(--info-bg);color:var(--info)}
.badge-purple{background:var(--accent-bg);color:var(--accent)}

/* ═══ FEED LIST ═══ */
.feed-list{display:flex;flex-direction:column;gap:0}
.feed-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:flex-start}
.feed-item:last-child{border-bottom:none}
.fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.fi-dot.purple{background:var(--accent)}.fi-dot.gold{background:var(--gold)}.fi-dot.success{background:var(--success)}.fi-dot.info{background:var(--info)}
.fi-content{flex:1}.fi-title{font-weight:600;color:var(--text);margin-bottom:2px}.fi-desc{color:var(--text2);font-size:12px}.fi-time{font-size:11px;color:var(--text3);margin-top:2px}

/* ═══ KPI ROW ═══ */
.kpi-row{display:flex;gap:16px;margin-bottom:24px}
.kpi-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;text-align:center;transition:var(--trans)}
.kpi-card:hover{box-shadow:var(--shadow-md)}.kpi-val{font-size:30px;font-weight:800;color:var(--text);line-height:1}.kpi-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
@media(max-width:768px){.kpi-row{flex-wrap:wrap}}

/* ═══ FORM GRID ═══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:var(--trans);background:var(--surface)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.form-group textarea{resize:vertical;min-height:80px}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}

/* ═══ TAB NAV ═══ */
.tab-nav{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab-item{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--trans)}
.tab-item:hover{color:var(--text)}.tab-item.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══ EMPTY STATE ═══ */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.es-icon{font-size:48px;margin-bottom:12px}.es-title{font-weight:700;font-size:16px;color:var(--text);margin-bottom:6px}.es-desc{font-size:13px;margin-bottom:16px}

/* ═══ POST DETAIL ═══ */
.post-detail{padding:8px 0}
.pd-meta{display:flex;gap:20px;font-size:12px;color:var(--text3);margin-bottom:20px}
.pd-content{font-size:14px;color:var(--text);line-height:1.9}

/* ═══ LOGIN ═══ */
.login-overlay{position:fixed;inset:0;z-index:3000;background:rgba(15,23,42,0.94);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
.login-overlay.hidden{display:none}
.login-box{background:var(--surface);border-radius:var(--radius-xl);padding:40px 36px;width:420px;max-width:94vw;box-shadow:0 24px 80px rgba(0,0,0,0.35)}
.lb-brand{text-align:center;margin-bottom:24px}
.lb-logo{width:48px;height:48px;margin:0 auto 12px;background:#1E2330;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800}
.lb-brand h3{font-size:18px;font-weight:700;margin-bottom:4px}.lb-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.lb-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.lb-tabs span{flex:1;text-align:center;padding:8px 0;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;transition:var(--trans)}
.lb-tabs span.active{color:var(--accent);border-bottom-color:var(--accent)}
.login-box label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px}
.login-box input,.login-box select,.login-box textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:var(--trans);margin-bottom:10px;background:var(--surface)}
.login-box input:focus,.login-box select:focus,.login-box textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.login-box input.error{border-color:var(--danger);background:var(--danger-bg)}
.lb-err{color:var(--danger);font-size:11px;margin:-6px 0 8px;display:none}.lb-err.show{display:block}
.lb-btn{width:100%;padding:10px;border-radius:7px;font-size:14px;font-weight:600;color:#fff;background:var(--accent);border:none;cursor:pointer;font-family:inherit;transition:var(--trans)}
.lb-btn:hover{background:var(--accent-light)}
.lb-link{text-align:center;margin-top:10px;font-size:11px;color:var(--accent);cursor:pointer;display:block}
.lb-link:hover{text-decoration:underline}.lb-link.skip{color:var(--success);font-weight:600}

.lb-cap-display{font-weight:800;font-size:14px;color:var(--accent);background:var(--accent-bg);padding:5px 14px;border-radius:7px;letter-spacing:1px;text-align:center;min-width:100px}
.lb-cap-refresh{font-size:16px;cursor:pointer;user-select:none;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:var(--trans)}
.lb-cap-refresh:hover{background:var(--surface2)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:var(--radius-xl);padding:32px;width:680px;max-width:94vw;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25)}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:20px;right:20px;padding:12px 22px;border-radius:8px;color:#fff;font-weight:500;font-size:13px;z-index:9999;animation:toastIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:6px;margin-bottom:4px;font-size:12px}.file-item a{color:var(--accent)}.file-item .remove{cursor:pointer;color:var(--danger);font-weight:700}
</style>
</head>

        <span style="font-size:12px;color:var(--text3)" id="userBadge"></span>
        <button class="tb-btn primary" id="tbLoginBtn" onclick="showLogin('login')">登录</button>
      </div>
    </header>

<script>
/* ═══════════════════════════════════════
   营销管理工作台 - 核心脚本
   ═══════════════════════════════════════ */
var API='http://localhost:8081';
var authToken=localStorage.getItem('selector_token')||'';
var authUser=null;

var page='home';

/* ── API ── */
async function api(m,u,b){
  var o={method:m,headers:{}};
  if(authToken)o.headers['Authorization']='Bearer '+authToken;
  if(b){if(b instanceof FormData)o.body=b;else{o.headers['Content-Type']='application/x-www-form-urlencoded';o.body=b;}}
  var r=await fetch(API+u,o);var d=await r.json();
  if(!r.ok)throw new Error(d.detail||'请求失败');return d;
}
function fd(o){var f=new FormData();for(var k in o)f.append(k,String(o[k]));return f;}

/* ── AUTH ── */
function showLogin(tab){
  tab=tab||'login';
  var h='<div class="lb-brand"><div class="lb-logo">安</div><h3>软安科技·华南</h3><div class="lb-sub">营销管理工作台</div></div>';
  h+='<div class="lb-tabs"><span class="'+(tab==='login'?'active':'')+'" onclick="showLogin(\'login\')">登录</span><span class="'+(tab==='forgot'?'active':'')+'" onclick="showLogin(\'forgot\')">忘记密码</span></div>';
  if(tab==='forgot'){
    h+='<p style="font-size:12px;color:var(--text3);margin-bottom:12px">输入用户名和邮箱，系统将重置密码</p>';
    h+='<label>用户名 *</label><input id="fgUser"><label>邮箱 *</label><input id="fgEmail">';
    h+='<button class="lb-btn" onclick="doForgot()">重置密码</button><div class="lb-link" onclick="showLogin(\'login\')">返回登录</div>';
  }else{
    h+='<label>用户名</label><input id="lu" placeholder="请输入用户名">';
    h+='<label>密码</label><input id="lp" type="password" placeholder="请输入密码" onkeydown="if(event.key==\'Enter\')doLogin()">';
    h+='<button class="lb-btn" onclick="doLogin()">登录</button>';
  }
  h+='<a href="ruanan-marketing-platform.html" style="display:block;text-align:center;margin-top:12px;font-size:14px;font-weight:600;color:#fff;background:#1E2330;padding:10px;border-radius:8px;text-decoration:none">← 返回平台首页</a>';
  h+='<div class="lb-err" id="loginErr" style="text-align:center"></div>';
  document.getElementById('loginBox').innerHTML=h;
  document.getElementById('loginOverlay').classList.remove('hidden');
  if(tab==='login'){document.getElementById('lu').focus();}
}
function hideLogin(){document.getElementById('loginOverlay').classList.add('hidden');}
function showErr(m){var e=document.getElementById('loginErr');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},3000);}
function skipLogin(){authUser={username:'guest',role:'guest'};hideLogin();updateAll();}
async function doLogin(){
  var u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value.trim();
  if(!u||!p){showErr('请输入用户名和密码');return;}
  try{var d=await api('POST','/api/login','username='+encodeURIComponent(u)+'&password='+encodeURIComponent(p));authToken=d.token;authUser=d;localStorage.setItem('selector_token',authToken);localStorage.setItem('selector_saved_user',u);hideLogin();updateAll();toast('登录成功');}catch(e){showErr(e.message);}
}
async function doRegister(){
  var u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPwd').value.trim(),em=document.getElementById('regEmail').value.trim(),ph=document.getElementById('regPhone').value.trim(),cp=document.getElementById('regCompany').value.trim(),rl=document.getElementById('regRole').value;
  if(!/^[a-zA-Z0-9_一-龥]{4,20}$/.test(u)){document.getElementById('regUserErr').classList.add('show');return;}else document.getElementById('regUserErr').classList.remove('show');
  if(p.length<8||!/[A-Za-z]/.test(p)||!/[0-9]/.test(p)){document.getElementById('regPwdErr').classList.add('show');return;}else document.getElementById('regPwdErr').classList.remove('show');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){document.getElementById('regEmailErr').classList.add('show');return;}else document.getElementById('regEmailErr').classList.remove('show');
  try{var d=await api('POST','/api/register',fd({username:u,password:p,email:em,phone:ph,company:cp,role:rl}));authToken=d.token;authUser=d;localStorage.setItem('selector_token',authToken);hideLogin();updateAll();toast('注册成功！');}catch(e){showErr(e.message);}
}
async function doForgot(){
  var u=document.getElementById('fgUser').value.trim(),em=document.getElementById('fgEmail').value.trim();
  if(!u||!em){showErr('请填写用户名和邮箱');return;}
  try{var d=await api('POST','/api/forgot-password','username='+encodeURIComponent(u)+'&email='+encodeURIComponent(em));alert(d.message);showLogin('login');}catch(e){showErr(e.message);}
}
function doLogout(){authToken='';authUser=null;localStorage.removeItem('selector_token');localStorage.removeItem('selector_saved_user');updateAll();nav('home');toast('已退出登录');}

/* ── NAVIGATION ── */
function updateAll(){updateSidebar();updateTopbar();}
function updateTopbar(){
  var badge=document.getElementById('userBadge');
  var btn=document.getElementById('tbLoginBtn');
  if(authUser){badge.textContent='👤 '+authUser.username;btn.textContent='退出';btn.className='tb-btn ghost';btn.onclick=doLogout;}else{badge.textContent='';btn.textContent='登录';btn.className='tb-btn primary';btn.onclick=function(){showLogin('login');};}
}
function updateSidebar(){
  var sbAvatar=document.getElementById('sbAvatar'),sbName=document.getElementById('sbName'),sbRole=document.getElementById('sbRole');
  if(authUser){document.getElementById('sidebar').querySelector('.sidebar-user').style.display='';sbAvatar.textContent=authUser.username[0].toUpperCase();sbName.textContent=authUser.username;sbRole.textContent=authUser.role==='admin'?'管理员':authUser.role==='partner'?'合作伙伴':'用户';}else{document.getElementById('sidebar').querySelector('.sidebar-user').style.display='none';}

  var nav=[];
  nav.push({section:'业务'});
  nav.push({href:'home',label:'软安科技华南营销首页',emoji:'🏠',icon:'i-home'});
  nav.push({href:'products',label:'软安科技产品简介',emoji:'📦',icon:'i-box'});
  nav.push({href:'solutions',label:'行业解决方案介绍',emoji:'🏭',icon:'i-build'});
  nav.push({href:'selector',label:'用户自主选型中心',emoji:'🎯',icon:'i-search2'});
  nav.push({href:'contact',label:'联系销售/进一步技术交流',emoji:'📞',icon:'i-phone'});
  nav.push({section:'营销'});
  nav.push({href:'insights',label:'行业洞察与相关咨询',emoji:'📊',icon:'i-pie'});
  nav.push({href:'partner',label:'华南合作伙伴管理中心',emoji:'🤝',icon:'i-users'});
  nav.push({section:'支持'});
  nav.push({href:'blog',label:'客户成功技术服务中心',emoji:'💡',icon:'i-book'});
  nav.push({section:'培训'});
  nav.push({href:'training',label:'软安内部员工培训中心',emoji:'🎓',icon:'i-book'});
  if(authUser&&authUser.role==='admin'){nav.push({section:'管理'});nav.push({href:'admin',label:'管理后台',emoji:'⚙️',icon:'i-settings'});}

  var h='';
  for(var i=0;i<nav.length;i++){
    var n=nav[i];
    if(n.section){h+='<div class="sn-section">'+n.section+'</div>';continue;}
    if(n.href==='partner'){h+='<a onclick="window.open(\'ruanan-partner-portal.html\',\'_blank\')"><span class="nav-icon">'+n.emoji+'</span><span>'+n.label+'</span></a>';}
    else h+='<a class="'+(page===n.href?'active':'')+'" onclick="nav(\''+n.href+'\')"><span class="nav-icon">'+n.emoji+'</span><span>'+n.label+'</span></a>';
  }
  document.getElementById('sidebarNav').innerHTML=h;

  // Footer
  var fh='';
  if(authUser){fh='<a onclick="_openChangePwd()">修改密码</a><a onclick="doLogout()">退出登录</a>';}else{fh='<a onclick="showLogin(\'login\')">登录工作台</a>';}
  document.getElementById('sidebarFooter').innerHTML=fh;

  // Breadcrumb
  var labels={home:'软安科技华南营销首页',products:'软安科技产品简介',solutions:'行业解决方案介绍',selector:'用户自主选型中心',contact:'联系销售/进一步技术交流',insights:'行业洞察与相关咨询',partner:'华南合作伙伴管理中心',blog:'客户成功技术服务中心',training:'软安内部员工培训中心',admin:'管理后台'};
  document.getElementById('tbBreadcrumb').innerHTML=(nav.find(function(x){return x.href===page;})||{}).emoji+' '+(labels[page]||'工作台');
}

function nav(p){
  page=p;window.location.hash='#'+p;
  updateSidebar();updateTopbar();
  var app=document.getElementById('app');
  if(PAGES[p])app.innerHTML=PAGES[p]();else app.innerHTML='';
}

/* ── TOAST ── */
function toast(msg,t){var d=document.createElement('div');d.className='toast '+(t||'success');d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove();},3000);}

/* ── PAGES ── */
var PAGES={};

// ═══ DASHBOARD ═══
PAGES.home=function(){
  var h='';

function _submitContact(){
  var co=document.getElementById("ctCompany")?.value.trim();
  var na=document.getElementById("ctName")?.value.trim();
  var ph=document.getElementById("ctPhone")?.value.trim();
  var ti=document.getElementById("ctTime")?.value;
  var de=document.getElementById("ctDesc")?.value.trim();
  if(!co||!na||!ph){toast("请填写必填项","error");return}
  api("POST","/api/leads",fd({company:co,contact:na,phone:ph,title:ti,custom_pain:de,type:"联系销售"})).then(function(){
    toast("已提交！我们将尽快联系您");
    document.querySelector(".card").innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:48px">✅</div><h3>提交成功</h3><p style="color:var(--text2)">销售团队将尽快与您联系</p></div>';
  }).catch(function(e){toast(e.message,"error")});
}

<script>
/* ═══════════════════════════════════════
   培训中心 & 管理扩展
   ═══════════════════════════════════════ */

// ═══ EVENT DELEGATION for training/admin actions ═══
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var act = el.getAttribute('data-action');
  var prm = el.getAttribute('data-param') || '';

  if (act === 'trainingTab') _tTab(prm, el);
  else if (act === 'filterTP') _filterTP(prm);
  else if (act === 'toggleModule') _toggleModule(el);
  else if (act === 'selectAnswer') { var p = prm.split(','); _selectAnswer(parseInt(p[0]), parseInt(p[1]), el); }
  else if (act === 'prevQ') _prevQ();
  else if (act === 'nextQ') _nextQ();
  else if (act === 'resetExam') _resetExam();
  else if (act === 'startExam') _startExam();
  else if (act === 'openTmForm') { if (prm) _openTmForm(parseInt(prm)); else _openTmForm(); }
  else if (act === 'openTqForm') { if (prm) _openTqForm(parseInt(prm)); else _openTqForm(); }
  else if (act === 'openKbForm') { if (prm) _openKbForm(parseInt(prm)); else _openKbForm(); }
  else if (act === 'delTm') _delTm(parseInt(prm));
  else if (act === 'delTq') _delTq(parseInt(prm));
  else if (act === 'delKb') _delKb(parseInt(prm));
  else if (act === 'csResetPwd') _csResetPwd(parseInt(prm));
  else if (act === 'csDel') _csDel(parseInt(prm));
  else if (act === 'csToggle') { var cs = prm.split(','); _csToggle(parseInt(cs[0]), cs[1]); }
  else if (act === 'aTab') aTab(prm);
});

// ═══ TRAINING STATE ═══
var _trainingState = { tab: 'study', productId: '', exam: null, modules: [], questions: [] };

// ═══ PAGES.training ═══
PAGES.training = function() {
  if(!authUser) return '<div class="empty-state" style="padding:60px 20px"><div class="es-icon">🔒</div><div class="es-title">请先登录</div><p style="color:var(--text2);font-size:13px;margin-top:8px">软安内部员工培训中心需要登录后使用</p><button class="btn btn-primary btn-lg" onclick="showLogin(\'login\')" style="margin-top:16px">登录工作台</button></div>';
  var h = '';
  h += '<div class="page-header"><div class="ph-eyebrow">Training</div><h1 class="ph-title">软安内部员工培训中心</h1><p class="ph-sub">产品知识库学习与考核 · 提升专业能力</p></div>';
  h += '<div class="tab-nav"><div class="tab-item active" data-action="trainingTab" data-param="study">📚 产品知识库</div><div class="tab-item" data-action="trainingTab" data-param="exam">📝 考核中心</div></div>';
  h += '<div id="trainingContent"></div>';
  setTimeout(function() { _tTab('study'); }, 100);
  return h;
};

function _tTab(t, chip) {
  _trainingState.tab = t;
  if (chip) {
    var tabs = document.querySelectorAll('#mainContent .tab-item');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    chip.classList.add('active');
  }
  var ct = document.getElementById('trainingContent');
  if (!ct) return;
  if (t === 'study') _renderStudy(ct);
  else _renderExam(ct);
}

function _renderStudy(ct) {
  var products = [
    { id: 'SAST', name: 'SAST 静态分析', icon: '🔍' },
    { id: 'SCA', name: 'SCA 成分分析', icon: '📦' },
    { id: 'BAT', name: 'BAT 二进制', icon: '🔐' },
    { id: 'FUZZ', name: 'Fuzz 模糊测试', icon: '🎯' },
    { id: 'MST', name: 'MST 大模型', icon: '🤖' },
    { id: 'CodingHawk', name: 'CodingHawk AI审计', icon: '✨' },
    { id: 'GuardFox', name: 'GuardFox 漏洞', icon: '🦊' }
  ];
  var h = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">';
  h += '<div class="inline-tag' + (!_trainingState.productId ? ' selected' : '') + '" data-action="filterTP" data-param="" style="cursor:pointer">全部产品</div>';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    h += '<div class="inline-tag' + (_trainingState.productId === p.id ? ' selected' : '') + '" data-action="filterTP" data-param="' + p.id + '" style="cursor:pointer">' + p.icon + ' ' + p.name + '</div>';
  }
  h += '</div>';
  h += '<div id="moduleList"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">加载中...</div></div></div>';
  ct.innerHTML = h;
  _loadModules();
}

function _filterTP(pid) {
  _trainingState.productId = pid;
  var tags = document.querySelectorAll('#trainingContent .inline-tag');
  for (var i = 0; i < tags.length; i++) {
    var t = tags[i];
    var tp = t.getAttribute('data-param') || '';
    if (tp === pid) t.classList.add('selected');
    else t.classList.remove('selected');
  }
  _loadModules();
}

function _loadModules() {
  var url = API + '/api/training/modules';
  if (_trainingState.productId) url += '?product_id=' + _trainingState.productId;
  fetch(url).then(function(r) { return r.json(); }).then(function(mods) {
    _trainingState.modules = mods;
    var ml = document.getElementById('moduleList');
    if (!ml) return;
    if (!mods.length) { ml.innerHTML = '<div class="empty-state"><div class="es-icon">📚</div><div class="es-title">暂无培训模块</div></div>'; return; }
    var h = '';
    for (var i = 0; i < mods.length; i++) {
      var m = mods[i];
      h += '<div class="card" style="margin-bottom:12px;cursor:pointer" data-action="toggleModule">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div style="font-weight:700;font-size:15px">📖 ' + m.title + '</div>';
      h += '<span class="badge badge-purple">' + m.product_id + '</span>';
      h += '</div>';
      h += '<div id="_modBody' + m.id + '" style="display:none;margin-top:12px;padding-top:16px;border-top:1px solid var(--border);font-size:14px;line-height:2;color:var(--text2)">' + (m.content||'').replace(/<h3>/g,'<h3 style="font-size:15px;font-weight:700;color:var(--text);margin:12px 0 6px">').replace(/<p>/g,'<p style="margin:4px 0">').replace(/<li>/g,'<li style="margin:2px 0">') + (m.file_urls?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><b>📎 附件：</b>'+m.file_urls.split(',').map(function(u){return '<a href="'+u+'" target="_blank" style="color:var(--accent)">'+u.split('/').pop()+'</a>'}).join(' &nbsp;')+'</div>':'') + '</div>';
      h += '</div>';
    }
    ml.innerHTML = h;
  }).catch(function() {});
}

function _toggleModule(el) {
  var body = el.querySelector('[id^="_modBody"]');
  if (!body) return;
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function _renderExam(ct) {
  if (_trainingState.exam) { _renderExamQuestion(ct); return; }
  var h = '<div class="card" style="text-align:center;padding:48px 24px">';
  h += '<div style="font-size:48px;margin-bottom:16px">📝</div>';
  h += '<h3 style="margin-bottom:8px">产品知识考核</h3>';
  h += '<p style="color:var(--text2);font-size:14px;margin-bottom:20px">共8道选择题，系统自动判分 · 满分100分 · 80分以上为优秀</p>';
  h += '<button class="btn btn-primary btn-lg" data-action="startExam">开始考试</button>';
  h += '</div>';
  h += '<div id="examRecords" style="margin-top:16px"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">加载历史记录...</div></div></div>';
  ct.innerHTML = h;
  _loadRecords();
}

function _loadRecords() {
  fetch(API + '/api/training/my-records', { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} })
    .then(function(r) { return r.json(); })
    .then(function(records) {
      var er = document.getElementById('examRecords');
      if (!er) return;
      if (!records.length) { er.innerHTML = '<div class="empty-state"><div class="es-icon">📋</div><div class="es-title">暂无考试记录</div></div>'; return; }
      var h = '<div class="card"><h4 style="margin-bottom:12px">📊 历史成绩</h4><table class="data-table"><tr><th>日期</th><th>得分</th><th>总分</th><th>正确率</th><th>等级</th></tr>';
      for (var i = 0; i < records.length; i++) {
        var r = records[i];
        var pct = r.total > 0 ? Math.round(r.score * 100 / r.total) : 0;
        var grade = pct >= 80 ? '优秀' : (pct >= 60 ? '合格' : '需加强');
        var color = pct >= 80 ? 'badge-green' : (pct >= 60 ? 'badge-yellow' : 'badge-red');
        h += '<tr><td>' + (r.created_at || '').substring(0, 16) + '</td><td>' + r.score + '</td><td>' + r.total + '</td><td>' + pct + '%</td><td><span class="badge ' + color + '">' + grade + '</span></td></tr>';
      }
      h += '</table></div>';
      er.innerHTML = h;
    }).catch(function() {});
}

function _startExam() {
  fetch(API + '/api/training/questions?question_type=mcq')
    .then(function(r) { return r.json(); })
    .then(function(qs) {
      if (!qs.length) { toast('暂无考题，请联系管理员', 'error'); return; }
      for (var i = qs.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = qs[i]; qs[i] = qs[j]; qs[j] = t; }
      qs = qs.slice(0, Math.min(8, qs.length));
      _trainingState.exam = { questions: qs, idx: 0, answers: {} };
      _trainingState.questions = qs;
      var ct = document.getElementById('trainingContent');
      if (ct) _renderExamQuestion(ct);
    }).catch(function(e) { toast('加载考题失败', 'error'); });
}

function _renderExamQuestion(ct) {
  var exam = _trainingState.exam;
  var qs = exam.questions;
  if (exam.idx >= qs.length) { _submitExam(ct); return; }
  var q = qs[exam.idx];
  var opts = [];
  try { opts = JSON.parse(q.options); } catch(e) { opts = []; }

  var dots = '';
  for (var i = 0; i < qs.length; i++) {
    var cls = i < exam.idx ? (exam.answers[qs[i].id] !== undefined ? 'done' : 'wrong') : (i === exam.idx ? 'cur' : '');
    dots += '<div class="qp-dot ' + cls + '"></div>';
  }

  var h = '<div class="card">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><div style="font-weight:600;font-size:14px;color:var(--text2)">第 ' + (exam.idx + 1) + ' / ' + qs.length + ' 题</div><button class="btn btn-ghost btn-sm" data-action="resetExam">退出考试</button></div>';
  h += '<div class="qp-dots">' + dots + '</div>';
  h += '<h3 style="font-size:18px;font-weight:700;margin:16px 0 20px">' + q.question_text + '</h3>';
  h += '<div style="display:flex;flex-direction:column;gap:10px">';
  for (var j = 0; j < opts.length; j++) {
    var sel = exam.answers[q.id] === j;
    h += '<div class="exam-opt' + (sel ? ' selected' : '') + '" data-action="selectAnswer" data-param="' + q.id + ',' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</div>';
  }
  h += '</div>';
  h += '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center">';
  if (exam.idx > 0) h += '<button class="btn btn-outline" data-action="prevQ">上一题</button>';
  if (exam.answers[q.id] !== undefined) h += '<button class="btn btn-primary" data-action="nextQ">' + (exam.idx < qs.length - 1 ? '下一题' : '提交考试') + '</button>';
  h += '</div>';
  h += '</div>';
  ct.innerHTML = h;
}

function _selectAnswer(qid, optIdx, el) {
  _trainingState.exam.answers[qid] = optIdx;
  var opts = el.parentElement.querySelectorAll('.exam-opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
}

function _nextQ() { _trainingState.exam.idx++; var ct = document.getElementById('trainingContent'); if (ct) _renderExamQuestion(ct); }
function _prevQ() { if (_trainingState.exam.idx > 0) _trainingState.exam.idx--; var ct = document.getElementById('trainingContent'); if (ct) _renderExamQuestion(ct); }
function _resetExam() { _trainingState.exam = null; var ct = document.getElementById('trainingContent'); if (ct) _renderExam(ct); }

function _submitExam(ct) {
  var answers = JSON.stringify(_trainingState.exam.answers);
  fetch(API + '/api/training/submit-exam', {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/x-www-form-urlencoded' }, authToken ? { 'Authorization': 'Bearer ' + authToken } : {}),
    body: 'answers=' + encodeURIComponent(answers)
  }).then(function(r) { return r.json(); })
  .then(function(result) {
    var gradeColor = result.percentage >= 80 ? 'var(--success)' : (result.percentage >= 60 ? 'var(--warning)' : 'var(--danger)');
    var h = '<div class="card" style="text-align:center;padding:40px 24px">';
    h += '<div style="font-size:48px;margin-bottom:16px">' + (result.percentage >= 80 ? '🎉' : (result.percentage >= 60 ? '📖' : '💪')) + '</div>';
    h += '<h2 style="margin-bottom:8px">考试完成</h2>';
    h += '<div style="font-size:48px;font-weight:800;color:' + gradeColor + ';margin:12px 0">' + result.percentage + '分</div>';
    h += '<div style="font-size:16px;color:var(--text2);margin-bottom:8px">正确 ' + result.score + ' / ' + result.total + ' 题 · 等级：<span class="badge ' + (result.percentage >= 80 ? 'badge-green' : (result.percentage >= 60 ? 'badge-yellow' : 'badge-red')) + '">' + result.grade + '</span></div>';
    h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px">';
    h += '<button class="btn btn-outline" data-action="resetExam">重新考试</button>';
    h += '<button class="btn btn-primary" data-action="trainingTab" data-param="study">返回学习</button>';
    h += '</div></div>';
    ct.innerHTML = h;
    _trainingState.exam = null;
    _loadRecords();
  }).catch(function(e) { toast('提交失败: ' + e.message, 'error'); });
}

function _renderCustomers() {
  api('GET', '/api/customer/admin/users').then(function(a) {

    if (!ct) return;
    var h = '<button class="btn btn-primary btn-sm" onclick="_openCustForm()" style="margin-bottom:12px">+ 新增客户账号</button>';
    if (a.length) {
      h += '<table class="data-table"><tr><th>ID</th><th>用户名</th><th>客户名称</th><th>姓名</th><th>邮箱</th><th>产品</th><th>行业</th><th>有效期至</th><th>状态</th><th>操作</th></tr>' + a.map(function(x) {
        var expire = '-';
        if (x.valid_from && x.valid_days) { try { var vf = new Date(x.valid_from); vf.setDate(vf.getDate() + parseInt(x.valid_days)); expire = vf.toISOString().substring(0, 10); } catch(e) {} }
        var frozen = x.status === 'frozen';
        return '<tr><td>' + x.id + '</td><td>' + x.username + '</td><td>' + (x.company||'-') + '</td><td>' + (x.contact_name||'-') + '</td><td>' + (x.email||'-') + '</td><td>' + (x.product_purchased||'-') + '</td><td>' + (x.industry||'-') + '</td><td>' + expire + '</td><td><span class="badge ' + (frozen?'badge-red':'badge-green') + '">' + (frozen?'已冻结':'正常') + '</span></td><td><button class="btn btn-sm btn-outline" onclick="_resetCustPwd(' + x.id + ')">重置密码</button> <button class="btn btn-sm" style="color:var(--warning)" onclick="_toggleCust(' + x.id + ',\'' + x.status + '\')">' + (frozen?'解冻':'冻结') + '</button> <button class="btn btn-sm" style="color:var(--danger)" onclick="_delCust(' + x.id + ')">删除</button></td></tr>';
      }).join('') + '</table>';
    } else { h += '<div class="empty-state"><div class="es-icon">👥</div><div class="es-title">暂无客户账号</div></div>'; }
    ct.innerHTML = h;
  }).catch(function() {});
}

function _extractSection(html, title){
  var m=html.match(new RegExp('<h3>'+title+'</h3>([\\s\\S]*?)(?=<h3>|$)','i'));
  if(!m)return'';
  return m[1].replace(/<[^>]+>/g,'').replace(/<li>/g,'').replace(/<\/li>/g,'\n').replace(/<br\s*\/?>/gi,'\n').replace(/&nbsp;/g,' ').trim();
}
function _uploadTmFile(files){
  for(var i=0;i<files.length;i++){(function(file){
    if(file.size>10*1024*1024){toast(file.name+' 超过10MB限制','error');return}
    var fd2=new FormData();fd2.append('file',file);
    fetch(API+'/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+authToken},body:fd2})
      .then(function(r){return r.json()}).then(function(d){window._tmUploadedFiles.push({name:d.filename,url:d.url});_renderTmFiles()})
      .catch(function(e){toast('上传失败: '+e.message,'error')});
  })(files[i])}
  document.getElementById('tmFileInput').value='';
}
function _renderTmFiles(){
  var el=document.getElementById('tmFiles');if(!el)return;
  if(!window._tmUploadedFiles.length){el.innerHTML='';return}
  el.innerHTML=window._tmUploadedFiles.map(function(f,i){return '<div class="file-item">📎 <a href="'+f.url+'" target="_blank" style="color:var(--accent)">'+f.name+'</a> <span class="remove" style="cursor:pointer;color:var(--danger)" onclick="window._tmUploadedFiles.splice('+i+',1);_renderTmFiles()">×</span></div>'}).join('');
}

  if (t === 'users') { _renderUsers(); }

  else if (t === 'training') {
    var ct2 = document.getElementById('aContent');
    ct2.innerHTML = '<button class="btn btn-primary btn-sm" data-action="openTmForm" style="margin-bottom:8px;margin-right:6px">+ 新增模块</button><button class="btn btn-outline btn-sm" data-action="openTqForm" style="margin-bottom:8px;margin-right:6px">+ 新增考题</button><button class="btn btn-ghost btn-sm" data-action="aTab" data-param="training" style="margin-bottom:8px">刷新</button><div id="tmList"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">加载中...</div></div></div>';
    _loadTmAdmin();
  }
  else if (t === 'kb') {
    api('GET', '/api/kb/articles?limit=100').then(function(a) {
      var ct3 = document.getElementById('aContent');
      if (a.length) { ct3.innerHTML = '<button class="btn btn-primary btn-sm" data-action="openKbForm" style="margin-bottom:12px">+ 新增KB文章</button><table class="data-table"><tr><th>ID</th><th>标题</th><th>分类</th><th>产品</th><th>阅读</th><th>操作</th></tr>' + a.map(function(x) { return '<tr><td>' + x.id + '</td><td>' + x.title + '</td><td>' + x.category + '</td><td>' + x.product_id + '</td><td>' + x.view_count + '</td><td><button class="btn btn-sm btn-outline" data-action="openKbForm" data-param="' + x.id + '">编辑</button> <button class="btn btn-sm" style="color:var(--danger)" data-action="delKb" data-param="' + x.id + '">删除</button></td></tr>'; }).join('') + '</table>'; } else { ct3.innerHTML = '<button class="btn btn-primary btn-sm" data-action="openKbForm" style="margin-bottom:12px">+ 新增KB文章</button><div class="empty-state"><div class="es-icon">📰</div><div class="es-title">暂无KB文章</div></div>'; }
    }).catch(function() {});
  }
  else if (t === 'tickets') {
    var ct4 = document.getElementById('aContent');
    if (!ct4) return;
    ct4.innerHTML = '<div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">加载中...</div></div>';
    api('GET', '/api/tickets?status=open').then(function(a) {
      if (a.length) { ct4.innerHTML = '<table class="data-table"><tr><th>用户</th><th>主题</th><th>分类</th><th>操作</th></tr>' + a.map(function(x) { return '<tr><td>' + x.username + '</td><td>' + x.subject + '</td><td>' + x.category + '</td><td><button class="btn btn-sm btn-outline" onclick="_replyTicket(' + x.id + ')">回复</button> <button class="btn btn-sm" style="color:var(--danger)" onclick="_closeTicket(' + x.id + ')">关闭</button></td></tr>'; }).join('') + '</table>'; } else { ct4.innerHTML = '<div class="empty-state"><div class="es-icon">✅</div><div class="es-title">无待处理工单</div></div>'; }
    }).catch(function() {});
  }
  else { _origATab2(t, chip); }
};

function _replyTicket(id) { var r = prompt('回复内容:'); if (!r) return; api('PUT', '/api/tickets/' + id + '/reply', 'reply=' + encodeURIComponent(r)).then(function() { toast('已回复'); aTab("tickets"); }).catch(function(e) { toast(e.message, 'error'); }); }
async function _closeTicket(id) { try { await api('PUT', '/api/tickets/' + id + '/close', ''); toast('已关闭'); aTab("tickets"); } catch(e) { toast(e.message, 'error'); } }

</script>
</body>
</html>
