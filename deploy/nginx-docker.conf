# ============================================
# 软安营销平台 - Nginx 反代配置
# 部署到：/etc/nginx/sites-available/ruanan.conf
# 用途：HTTPS 终止 + 反代到 Docker 容器(8081) + 静态文件加速
# ============================================

# 当前：用 IP 访问（HTTP）
# 未来：加域名后把 server_name 改成域名，并加 443 SSL 块

server {
    listen 80;
    server_name _;  # 未来改成 yourdomain.com

    # 客户端上传上限（与后端一致）
    client_max_body_size 100M;

    # 访问日志
    access_log /var/log/nginx/ruanan-access.log;
    error_log  /var/log/nginx/ruanan-error.log;

    # 静态上传文件：Nginx 直接服务（绕过后端，省资源）
    # Docker 把 uploads 挂到宿主机 /opt/ruanan/uploads
    location /uploads/ {
        alias /opt/ruanan/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # 禁止目录列举
        autoindex off;
    }

    # 所有 /api 和 HTML 页面反代到后端容器
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（未来如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 超时
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

