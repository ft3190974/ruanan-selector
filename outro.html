<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软安科技 · 片尾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0a0f1e 0%,#0f172a 40%,#1a1f35 70%,#0a0f1e 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden
}
.container{text-align:center}
/* 背景粒子 */
.particles{position:fixed;inset:0;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:rgba(37,99,235,0.6);border-radius:50%;animation:float linear infinite}
.particle:nth-child(1){left:10%;animation-duration:8s;animation-delay:0s}
.particle:nth-child(2){left:25%;animation-duration:10s;animation-delay:1s}
.particle:nth-child(3){left:40%;animation-duration:7s;animation-delay:2s}
.particle:nth-child(4){left:55%;animation-duration:12s;animation-delay:0.5s}
.particle:nth-child(5){left:70%;animation-duration:9s;animation-delay:1.5s}
.particle:nth-child(6){left:85%;animation-duration:11s;animation-delay:3s}
@keyframes float{
  0%{bottom:-10px;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{bottom:110%;opacity:0}
}
/* Logo */
.logo-wrap{animation:fadeInScale 0.8s ease-out forwards}
.logo{
  width:100px;height:100px;border-radius:24px;
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 50%,#1e40af 100%);
  margin:0 auto 32px;display:flex;align-items:center;justify-content:center;
  font-size:48px;font-weight:900;color:#fff;
  box-shadow:0 20px 60px rgba(37,99,235,0.4),0 0 0 1px rgba(255,255,255,0.1) inset
}
@keyframes fadeInScale{
  from{opacity:0;transform:scale(0.6)}
  to{opacity:1;transform:scale(1)}
}
/* 主标题 */
.main-title{
  font-size:52px;font-weight:900;color:#fff;letter-spacing:6px;
  margin-bottom:20px;opacity:0;
  animation:slideUp 0.8s 0.3s ease-out forwards
}
.main-title .accent{color:#3b82f6}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
/* 副标题标签 */
.tags{
  display:flex;gap:16px;justify-content:center;margin-bottom:36px;flex-wrap:wrap
}
.tag{
  padding:10px 24px;border-radius:30px;font-size:18px;font-weight:700;
  color:#fff;opacity:0;letter-spacing:3px;
  border:1px solid rgba(255,255,255,0.2)
}
.tag:nth-child(1){background:rgba(37,99,235,0.3);animation:slideUp 0.6s 0.6s ease-out forwards}
.tag:nth-child(2){background:rgba(16,185,129,0.3);animation:slideUp 0.6s 0.8s ease-out forwards}
.tag:nth-child(3){background:rgba(245,158,11,0.3);animation:slideUp 0.6s 1.0s ease-out forwards}
.tag:nth-child(4){background:rgba(139,92,246,0.3);animation:slideUp 0.6s 1.2s ease-out forwards}
/* 底部标语 */
.slogan{
  font-size:22px;color:rgba(255,255,255,0.7);letter-spacing:3px;
  opacity:0;margin-top:8px;
  animation:slideUp 0.8s 1.5s ease-out forwards
}
/* 分割线 */
.divider{
  width:80px;height:2px;background:linear-gradient(90deg,transparent,rgba(37,99,235,0.6),transparent);
  margin:28px auto;opacity:0;
  animation:fadeIn 0.6s 1.3s ease-out forwards
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
/* 底部水滴波纹 */
.ripple{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);opacity:0;
  animation:fadeIn 1s 1.8s ease-out forwards}
.ripple .dot{width:6px;height:6px;background:rgba(37,99,235,0.4);border-radius:50%;margin:0 auto}
.ripple .ring{
  width:60px;height:60px;border:1px solid rgba(37,99,235,0.15);border-radius:50%;
  margin:-33px 0 0 -27px;animation:ringPulse 3s ease-out infinite
}
@keyframes ringPulse{
  0%{transform:scale(1);opacity:0.5}
  100%{transform:scale(3);opacity:0}
}
/* 整体微光 */
.glow{position:fixed;top:50%;left:50%;width:400px;height:400px;
  background:radial-gradient(circle,rgba(37,99,235,0.06) 0%,transparent 70%);
  transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>
<div class="glow"></div>
<div class="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>

<div class="container">
  <div class="logo-wrap"><div class="logo">软</div></div>
  <div class="main-title">软安科技 <span class="accent">华南营销中心</span></div>
  <div class="tags">
    <span class="tag">专 注</span>
    <span class="tag">专 业</span>
    <span class="tag">高 效</span>
    <span class="tag">智 能</span>
  </div>
  <div class="divider"></div>
  <div class="slogan">忠实的软件供应链安全搭档</div>
</div>

<div class="ripple"><div class="dot"></div><div class="ring"></div></div>
</body>
</html>
