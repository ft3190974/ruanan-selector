<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软安科技 · 片头</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0e17;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden
}
.scene{text-align:center;position:relative}
/* 背景光晕 */
.glow-bg{position:fixed;top:50%;left:50%;width:600px;height:600px;
  background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,rgba(16,185,129,0.04) 40%,transparent 70%);
  transform:translate(-50%,-50%);pointer-events:none;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}
/* 粒子 */
.particles{position:fixed;inset:0;pointer-events:none}
.p{position:absolute;border-radius:50%;animation:floatUp linear infinite}
.p:nth-child(1){left:10%;width:2px;height:2px;background:rgba(37,99,235,0.5);animation-duration:6s;animation-delay:0s}
.p:nth-child(2){left:25%;width:3px;height:3px;background:rgba(16,185,129,0.4);animation-duration:8s;animation-delay:1s}
.p:nth-child(3){left:40%;width:1px;height:1px;background:rgba(245,158,11,0.5);animation-duration:7s;animation-delay:2s}
.p:nth-child(4){left:55%;width:2px;height:2px;background:rgba(139,92,246,0.4);animation-duration:9s;animation-delay:0.5s}
.p:nth-child(5){left:70%;width:3px;height:3px;background:rgba(37,99,235,0.3);animation-duration:5s;animation-delay:1.5s}
.p:nth-child(6){left:85%;width:1px;height:1px;background:rgba(16,185,129,0.5);animation-duration:10s;animation-delay:3s}
@keyframes floatUp{0%{bottom:-10px;opacity:0}20%{opacity:1}80%{opacity:1}100%{bottom:110%;opacity:0}}

/* Logo */
.logo-wrap{animation:logoIn 1s 0.2s ease-out both}
.logo{
  width:90px;height:90px;border-radius:22px;margin:0 auto 28px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;font-weight:900;color:#fff;
  box-shadow:0 24px 64px rgba(37,99,235,0.35),0 0 0 2px rgba(255,255,255,0.08) inset;
  position:relative
}
.logo::after{content:'';position:absolute;inset:-3px;border-radius:24px;background:linear-gradient(135deg,rgba(37,99,235,0.3),rgba(16,185,129,0.3),rgba(37,99,235,0.3));z-index:-1;animation:borderRotate 4s linear infinite}
@keyframes logoIn{from{opacity:0;transform:scale(0.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes borderRotate{from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg)}}

/* 主标题 */
.title{font-size:48px;font-weight:900;color:#fff;letter-spacing:6px;line-height:1.3;margin-bottom:24px}
.title .line{display:block;animation:slideIn 0.8s ease-out both}
.title .line:nth-child(1){animation-delay:0.6s}
.title .line:nth-child(2){animation-delay:0.9s}
.title .accent{background:linear-gradient(135deg,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* 标语 */
.tagline{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.tagline span{
  padding:12px 28px;border-radius:30px;font-size:18px;font-weight:700;
  color:#fff;letter-spacing:3px;border:1px solid rgba(255,255,255,0.15);
  animation:tagIn 0.6s ease-out both
}
.tagline span:nth-child(1){background:rgba(37,99,235,0.25);animation-delay:1.2s}
.tagline span:nth-child(2){background:rgba(16,185,129,0.25);animation-delay:1.4s}
.tagline span:nth-child(3){background:rgba(245,158,11,0.25);animation-delay:1.6s}
@keyframes tagIn{from{opacity:0;transform:scale(0.8) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* 底部光条 */
.line-bar{width:0;height:2px;margin:0 auto;background:linear-gradient(90deg,transparent,rgba(37,99,235,0.6),rgba(16,185,129,0.4),transparent);
  animation:lineGrow 0.8s 1.8s ease-out forwards}
@keyframes lineGrow{from{width:0}to{width:200px}}
</style>
</head>
<body>
<div class="glow-bg"></div>
<div class="particles"><div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div></div>
<div class="scene">
  <div class="logo-wrap"><div class="logo">软</div></div>
  <div class="title">
    <span class="line">软安科技<span class="accent">华南区域</span></span>
    <span class="line">开放营销中台</span>
  </div>
  <div class="tagline">
    <span>用心做服务</span>
    <span>专业加专注</span>
  </div>
  <div class="line-bar"></div>
</div>
</body>
</html>
